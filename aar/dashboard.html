<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#221F60">
    <title>RASAAI Dashboard - Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .dash-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:32px}
        .dash-stat-card{background:var(--white);border-radius:var(--radius-lg);padding:24px;text-align:center;box-shadow:var(--shadow-sm);border:1px solid var(--gray-200)}
        .dash-stat-num{font-size:32px;font-weight:800;color:var(--navy)}
        .dash-stat-lbl{font-size:12px;color:var(--gray-500);margin-top:4px;text-transform:uppercase}
        .dash-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;border-bottom:2px solid var(--gray-200);padding-bottom:12px}
        .dash-tab{padding:10px 20px;border:none;background:none;font-weight:600;font-size:14px;cursor:pointer;color:var(--gray-600);border-radius:var(--radius-pill);transition:all 0.15s;font-family:inherit}
        .dash-tab.active{background:var(--orange);color:var(--white)}
        .dash-tab:hover:not(.active){background:var(--gray-100)}
        .dash-actions{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
        .dash-table{overflow-x:auto;background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm)}
        .dash-table table{width:100%;border-collapse:collapse;min-width:800px}
        .dash-table th,.dash-table td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--gray-200);font-size:13px}
        .dash-table th{background:var(--navy);color:var(--white);font-weight:600}
        .dash-table tr:hover td{background:var(--gray-50)}
        .status-badge{padding:3px 10px;border-radius:var(--radius-pill);font-size:11px;font-weight:600;display:inline-block}
        .status-badge.active,.status-badge.online{background:var(--green-light);color:var(--green)}
        .status-badge.inactive,.status-badge.offline,.status-badge.maintenance{background:var(--red-light);color:var(--red)}
        .dash-header{background:var(--navy);color:var(--white);padding:20px 24px;margin-bottom:32px;border-radius:var(--radius-lg);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
        .dash-header h2{margin:0;font-size:24px}
        .dash-header a{color:var(--white);text-decoration:none;font-size:14px;opacity:0.8}
        .dash-header a:hover{opacity:1}
    </style>
</head>
<body style="background:var(--gray-50);padding:20px">

<div class="dash-header">
    <div>
        <h2>📊 RASAAI Dashboard</h2>
        <p style="opacity:0.7;font-size:13px;margin-top:4px">Manage rickshaws, clients, affiliates & campaigns</p>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
        <a href="index.html">🏠 Website</a>
        <a href="https://wa.me/919594306625">💬 WhatsApp</a>
        <button class="btn btn-primary btn-sm" onclick="Dashboard.exportData()">📥 Export Data</button>
        <button class="btn btn-outline btn-sm" onclick="Dashboard.importData()" style="border-color:rgba(255,255,255,0.3);color:white">📤 Import Data</button>
    </div>
</div>

<div id="dashContent">
    <p style="text-align:center;padding:60px;color:var(--gray-500)">Loading dashboard...</p>
</div>

<script src="dashboard.js"></script>
</body>
</html>
