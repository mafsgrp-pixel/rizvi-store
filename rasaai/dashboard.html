<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
    <meta name="theme-color" content="#6C4DF6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0F1117" media="(prefers-color-scheme: dark)">
    <meta name="color-scheme" content="light dark">
    
    <title>Dashboard - RASAAI Outdoor Advertising Network</title>
    <meta name="description" content="Your RASAAI dashboard. Manage campaigns, view analytics, track performance.">
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="canonical" href="https://rizvi.store/rasaai/dashboard.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C4DF6'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-weight='bold'>R</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Dashboard specific */
        .dashboard-body {
            display: flex;
            min-height: 100vh;
            background: var(--bg);
        }
        body.dark-mode .dashboard-body {
            background: var(--dark-bg);
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 24px 16px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 200;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }
        body.dark-mode .sidebar {
            background: var(--dark-glass-bg);
            border-right-color: var(--dark-glass-border);
        }
        
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            margin-bottom: 32px;
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }
        .sidebar-logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--accent-cyan));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFF;
            font-size: 18px;
            font-weight: 900;
            -webkit-text-fill-color: #FFF;
            flex-shrink: 0;
        }
        
        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
        }
        .sidebar-link:hover {
            background: rgba(108,77,246,0.08);
            color: var(--primary);
        }
        .sidebar-link.active {
            background: rgba(108,77,246,0.12);
            color: var(--primary);
            font-weight: 600;
        }
        .sidebar-link-icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }
        body.dark-mode .sidebar-link {
            color: var(--dark-muted);
        }
        body.dark-mode .sidebar-link:hover {
            background: rgba(139,124,255,0.1);
            color: var(--dark-primary);
        }
        body.dark-mode .sidebar-link.active {
            background: rgba(139,124,255,0.15);
            color: var(--dark-primary);
        }
        
        .sidebar-footer {
            border-top: 1px solid var(--border);
            padding-top: 16px;
            margin-top: auto;
        }
        body.dark-mode .sidebar-footer {
            border-top-color: var(--dark-border);
        }
        
        /* Main Content */
        .dashboard-main {
            margin-left: 280px;
            flex: 1;
            padding: 32px;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            gap: 16px;
            flex-wrap: wrap;
        }
        .top-bar-left h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
        }
        .top-bar-left p {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 4px 0 0;
        }
        body.dark-mode .top-bar-left p {
            color: var(--dark-muted);
        }
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: var(--radius-pill);
            transition: all 0.2s;
        }
        .user-menu:hover {
            background: rgba(108,77,246,0.06);
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent-cyan));
            color: #FFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }
        .user-name {
            font-weight: 600;
            font-size: 14px;
        }
        .user-role {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: capitalize;
        }
        body.dark-mode .user-role {
            color: var(--dark-muted);
        }
        
        /* Mobile menu button */
        .mobile-sidebar-toggle {
            display: none;
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            background: var(--card);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 20px;
            align-items: center;
            justify-content: center;
        }
        body.dark-mode .mobile-sidebar-toggle {
            background: var(--dark-card);
            border-color: var(--dark-border);
        }
        
        /* Content sections */
        .dashboard-section {
            display: none;
        }
        .dashboard-section.active {
            display: block;
        }
        
        /* Quick stats */
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--card);
            border-radius: var(--radius-card);
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s;
            cursor: pointer;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }
        body.dark-mode .stat-card {
            background: var(--dark-card);
            border-color: var(--dark-border);
        }
        .stat-card-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .stat-card-value {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        .stat-card-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        body.dark-mode .stat-card-label {
            color: var(--dark-muted);
        }
        .stat-card-trend {
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }
        .stat-card-trend.up {
            color: var(--success);
        }
        .stat-card-trend.down {
            color: var(--danger);
        }
        
        /* Overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 199;
        }
        .sidebar-overlay.show {
            display: block;
        }
        
        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.mobile-open {
                transform: translateX(0);
            }
            .dashboard-main {
                margin-left: 0 !important;
            }
            .mobile-sidebar-toggle {
                display: flex;
            }
        }
        @media (max-width: 768px) {
            .dashboard-main {
                padding: 20px;
            }
            .quick-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .quick-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-body">
        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="DashboardPage.toggleSidebar()"></div>
        
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar" role="navigation" aria-label="Dashboard navigation">
            <div class="sidebar-logo" onclick="window.location.href='index.html'">
                <div class="sidebar-logo-icon">R</div>
                <span>RASAAI</span>
            </div>
            
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Links populated by JS based on role -->
            </nav>
            
            <div class="sidebar-footer">
                <a class="sidebar-link" onclick="Auth.logout()" style="cursor:pointer">
                    <span class="sidebar-link-icon">🚪</span>
                    <span>Logout</span>
                </a>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="dashboard-main" id="dashboard-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="top-bar-left">
                    <div style="display:flex;align-items:center;gap:12px">
                        <button class="mobile-sidebar-toggle" onclick="DashboardPage.toggleSidebar()" aria-label="Toggle menu">☰</button>
                        <div>
                            <h1 id="page-title">Dashboard</h1>
                            <p id="page-subtitle">Loading...</p>
                        </div>
                    </div>
                </div>
                <div class="top-bar-right">
                    <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle theme" onclick="App.applyTheme(App.state.theme==='light'?'dark':'light')">🌙</button>
                    <div class="user-menu" id="user-menu">
                        <div class="user-avatar" id="user-avatar-initial">U</div>
                        <div>
                            <div class="user-name" id="user-name-display">User</div>
                            <div class="user-role" id="user-role-display">guest</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Content Area -->
            <div id="content-area">
                <!-- Overview Section (All Roles) -->
                <div class="dashboard-section active" id="section-overview">
                    <div class="quick-stats" id="quick-stats"></div>
                    <div id="overview-extra"></div>
                </div>
                
                <!-- Campaigns Section -->
                <div class="dashboard-section" id="section-campaigns">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
                        <h2>My Campaigns</h2>
                        <a href="campaign.html" class="btn btn-primary">+ New Campaign</a>
                    </div>
                    <div class="data-table-container" id="campaigns-table-container"></div>
                </div>
                
                <!-- Invoices Section -->
                <div class="dashboard-section" id="section-invoices">
                    <h2 style="margin-bottom:24px">My Invoices</h2>
                    <div class="data-table-container" id="invoices-table-container"></div>
                </div>
                
                <!-- Analytics Section -->
                <div class="dashboard-section" id="section-analytics">
                    <h2 style="margin-bottom:24px">Analytics</h2>
                    <div class="widget-grid" id="analytics-widgets"></div>
                    <div class="chart-container" style="margin-top:24px">
                        <h3>📈 Campaign Performance</h3>
                        <canvas id="analytics-chart" height="300"></canvas>
                    </div>
                </div>
                
                <!-- Affiliate Section -->
                <div class="dashboard-section" id="section-affiliate">
                    <h2 style="margin-bottom:24px">Affiliate Program</h2>
                    <div id="affiliate-content"></div>
                </div>
                
                <!-- Profile Section -->
                <div class="dashboard-section" id="section-profile">
                    <h2 style="margin-bottom:24px">My Profile</h2>
                    <div class="glass-card" style="max-width:600px" id="profile-content"></div>
                </div>
                
                <!-- Admin: Users Section -->
                <div class="dashboard-section" id="section-users">
                    <h2 style="margin-bottom:24px">User Management</h2>
                    <div class="data-table-container" id="users-table-container"></div>
                </div>
                
                <!-- Admin: All Campaigns -->
                <div class="dashboard-section" id="section-all-campaigns">
                    <h2 style="margin-bottom:24px">All Campaigns</h2>
                    <div class="data-table-container" id="all-campaigns-table-container"></div>
                </div>
                
                <!-- Driver: Tasks -->
                <div class="dashboard-section" id="section-tasks">
                    <h2 style="margin-bottom:24px">My Tasks</h2>
                    <div id="tasks-container"></div>
                </div>
                
                <!-- Sales: CRM -->
                <div class="dashboard-section" id="section-crm">
                    <h2 style="margin-bottom:24px">CRM Pipeline</h2>
                    <div id="crm-content"></div>
                </div>
            </div>
        </main>
    </div>
    
    <div id="notification-container" class="notification-container" aria-live="polite" role="status"></div>
    
    <script src="app.js"></script>
    <script>
        // =====================================================
        // DASHBOARD PAGE CONTROLLER
        // =====================================================
        const DashboardPage = {
            user: null,
            currentSection: 'overview',
            
            init() {
                // Check authentication
                this.user = Auth.getCurrentUser();
                if (!this.user) {
                    window.location.href = 'login.html?redirect=dashboard.html';
                    return;
                }
                
                // Update UI
                this.updateUserDisplay();
                this.buildSidebar();
                this.loadSection('overview');
                this.updateThemeToggle();
                
                // Set page title
                document.title = `${this.user.role.charAt(0).toUpperCase() + this.user.role.slice(1)} Dashboard - RASAAI`;
            },
            
            updateUserDisplay() {
                const nameEl = document.getElementById('user-name-display');
                const roleEl = document.getElementById('user-role-display');
                const avatarEl = document.getElementById('user-avatar-initial');
                const subtitle = document.getElementById('page-subtitle');
                
                if (nameEl) nameEl.textContent = this.user.name;
                if (roleEl) roleEl.textContent = this.user.role;
                if (avatarEl) avatarEl.textContent = this.user.name.charAt(0).toUpperCase();
                if (subtitle) subtitle.textContent = `Welcome back, ${this.user.name.split(' ')[0]}`;
            },
            
            updateThemeToggle() {
                const btn = document.getElementById('theme-toggle-btn');
                if (btn) {
                    btn.textContent = App.state.theme === 'dark' ? '☀️' : '🌙';
                }
            },
            
            buildSidebar() {
                const nav = document.getElementById('sidebar-nav');
                if (!nav) return;
                
                const links = this.getLinksForRole(this.user.role);
                nav.innerHTML = links.map(link => `
                    <a class="sidebar-link ${link.section === 'overview' ? 'active' : ''}" 
                       data-section="${link.section}" 
                       onclick="DashboardPage.loadSection('${link.section}')">
                        <span class="sidebar-link-icon">${link.icon}</span>
                        <span>${link.label}</span>
                    </a>
                `).join('');
            },
            
            getLinksForRole(role) {
                const commonLinks = [
                    { section: 'overview', icon: '📊', label: 'Overview' },
                    { section: 'profile', icon: '👤', label: 'Profile' }
                ];
                
                switch (role) {
                    case 'admin':
                        return [
                            { section: 'overview', icon: '📊', label: 'Overview' },
                            { section: 'all-campaigns', icon: '📢', label: 'All Campaigns' },
                            { section: 'users', icon: '👥', label: 'Users' },
                            { section: 'analytics', icon: '📈', label: 'Analytics' },
                            { section: 'crm', icon: '🎯', label: 'CRM' },
                            { section: 'profile', icon: '👤', label: 'Profile' }
                        ];
                    case 'client':
                        return [
                            { section: 'overview', icon: '📊', label: 'Overview' },
                            { section: 'campaigns', icon: '📢', label: 'My Campaigns' },
                            { section: 'invoices', icon: '🧾', label: 'Invoices' },
                            { section: 'analytics', icon: '📈', label: 'Analytics' },
                            { section: 'affiliate', icon: '🔗', label: 'Affiliate' },
                            { section: 'profile', icon: '👤', label: 'Profile' }
                        ];
                    case 'driver':
                        return [
                            { section: 'overview', icon: '📊', label: 'Overview' },
                            { section: 'tasks', icon: '📋', label: 'My Tasks' },
                            { section: 'profile', icon: '👤', label: 'Profile' }
                        ];
                    case 'affiliate':
                        return [
                            { section: 'overview', icon: '📊', label: 'Overview' },
                            { section: 'affiliate', icon: '🔗', label: 'Affiliate' },
                            { section: 'profile', icon: '👤', label: 'Profile' }
                        ];
                    case 'sales':
                        return [
                            { section: 'overview', icon: '📊', label: 'Overview' },
                            { section: 'crm', icon: '🎯', label: 'CRM' },
                            { section: 'profile', icon: '👤', label: 'Profile' }
                        ];
                    default:
                        return commonLinks;
                }
            },
            
            loadSection(section) {
                this.currentSection = section;
                
                // Update sidebar active state
                document.querySelectorAll('.sidebar-link').forEach(link => {
                    link.classList.toggle('active', link.dataset.section === section);
                });
                
                // Hide all sections
                document.querySelectorAll('.dashboard-section').forEach(s => s.classList.remove('active'));
                
                // Show selected section
                const sectionEl = document.getElementById('section-' + section);
                if (sectionEl) sectionEl.classList.add('active');
                
                // Update page title
                const titles = {
                    overview: 'Dashboard Overview',
                    campaigns: 'My Campaigns',
                    invoices: 'My Invoices',
                    analytics: 'Analytics',
                    affiliate: 'Affiliate Program',
                    profile: 'My Profile',
                    users: 'User Management',
                    'all-campaigns': 'All Campaigns',
                    tasks: 'My Tasks',
                    crm: 'CRM Pipeline'
                };
                document.getElementById('page-title').textContent = titles[section] || 'Dashboard';
                
                // Load section content
                switch (section) {
                    case 'overview': this.renderOverview(); break;
                    case 'campaigns': this.renderCampaigns(); break;
                    case 'invoices': this.renderInvoices(); break;
                    case 'analytics': this.renderAnalytics(); break;
                    case 'affiliate': this.renderAffiliate(); break;
                    case 'profile': this.renderProfile(); break;
                    case 'users': this.renderUsers(); break;
                    case 'all-campaigns': this.renderAllCampaigns(); break;
                    case 'tasks': this.renderTasks(); break;
                    case 'crm': this.renderCRM(); break;
                }
            },
            
            toggleSidebar() {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                sidebar.classList.toggle('mobile-open');
                overlay.classList.toggle('show');
            },
            
            // =====================================================
            // SECTION RENDERERS
            // =====================================================
            
            renderOverview() {
                const statsContainer = document.getElementById('quick-stats');
                const extraContainer = document.getElementById('overview-extra');
                if (!statsContainer) return;
                
                const campStats = CampaignManager.getStats(this.user.id);
                const invStats = Inventory.getStats();
                
                let stats = [];
                
                if (this.user.role === 'admin') {
                    stats = [
                        { icon: '📢', value: campStats.total, label: 'Total Campaigns', trend: `${campStats.active} active`, trendClass: 'up' },
                        { icon: '💰', value: '₹' + campStats.totalCost.toLocaleString(), label: 'Total Revenue', trend: '+18.5%', trendClass: 'up' },
                        { icon: '👥', value: Auth.getAllUsers().length, label: 'Total Users', trend: 'All roles', trendClass: 'up' },
                        { icon: '🛺', value: invStats.available, label: 'Available Rickshaws', trend: invStats.booked + ' booked', trendClass: 'up' }
                    ];
                } else if (this.user.role === 'client') {
                    stats = [
                        { icon: '📢', value: campStats.active, label: 'Active Campaigns', trend: campStats.total + ' total', trendClass: 'up' },
                        { icon: '👁️', value: campStats.totalImpressions.toLocaleString(), label: 'Total Impressions', trend: '+12%', trendClass: 'up' },
                        { icon: '💰', value: '₹' + campStats.totalCost.toLocaleString(), label: 'Total Spent', trend: 'Investment', trendClass: 'up' },
                        { icon: '🧾', value: InvoiceManager.getInvoices(this.user.id).length, label: 'Invoices', trend: 'View all', trendClass: 'up' }
                    ];
                } else if (this.user.role === 'driver') {
                    const tasks = CRMManager.getTasks(this.user.id);
                    stats = [
                        { icon: '📋', value: tasks.filter(t => t.status === 'pending').length, label: 'Pending Tasks', trend: 'Due today', trendClass: 'up' },
                        { icon: '✅', value: tasks.filter(t => t.status === 'completed').length, label: 'Completed Tasks', trend: 'Great job!', trendClass: 'up' },
                        { icon: '🛺', value: this.user.rickshawId || 'N/A', label: 'Rickshaw ID', trend: this.user.zone || '', trendClass: 'up' },
                        { icon: '📍', value: 'Active', label: 'GPS Status', trend: 'Online', trendClass: 'up' }
                    ];
                } else if (this.user.role === 'affiliate') {
                    const affStats = AffiliateManager.getReferralStats(this.user.id);
                    const commission = AffiliateManager.getCommission(this.user.id);
                    stats = [
                        { icon: '🔗', value: affStats.clicks, label: 'Total Clicks', trend: '+8%', trendClass: 'up' },
                        { icon: '👤', value: affStats.leads, label: 'Leads', trend: '+5 new', trendClass: 'up' },
                        { icon: '✅', value: affStats.conversions, label: 'Conversions', trend: '10% rate', trendClass: 'up' },
                        { icon: '💰', value: '₹' + commission.toLocaleString(), label: 'Commission Earned', trend: 'Available', trendClass: 'up' }
                    ];
                } else if (this.user.role === 'sales') {
                    const pipeline = CRMManager.getPipelineStats();
                    stats = [
                        { icon: '🎯', value: pipeline.total, label: 'Total Leads', trend: 'Pipeline', trendClass: 'up' },
                        { icon: '✅', value: pipeline.Won?.length || 0, label: 'Won Deals', trend: CRMManager.getConversionRate() + '%', trendClass: 'up' },
                        { icon: '💰', value: '₹' + (pipeline.totalValue || 0).toLocaleString(), label: 'Pipeline Value', trend: 'Active', trendClass: 'up' },
                        { icon: '📋', value: CRMManager.getTasks(this.user.id).filter(t => t.status === 'pending').length, label: 'Pending Tasks', trend: 'Follow-ups', trendClass: 'up' }
                    ];
                }
                
                statsContainer.innerHTML = stats.map(s => `
                    <div class="stat-card" onclick="DashboardPage.loadSection('${s.icon === '📢' && this.user.role === 'admin' ? 'all-campaigns' : s.icon === '📢' ? 'campaigns' : s.icon === '🧾' ? 'invoices' : s.icon === '🔗' || s.icon === '💰' && this.user.role === 'affiliate' ? 'affiliate' : s.icon === '📋' ? 'tasks' : s.icon === '🎯' ? 'crm' : 'overview'}')">
                        <div class="stat-card-icon">${s.icon}</div>
                        <div class="stat-card-value">${s.value}</div>
                        <div class="stat-card-label">${s.label}</div>
                        <div class="stat-card-trend ${s.trendClass}">${s.trend}</div>
                    </div>
                `).join('');
                
                // Extra content for overview
                if (extraContainer) {
                    if (this.user.role === 'client') {
                        const recentCampaigns = CampaignManager.getCampaigns(this.user.id).slice(-5).reverse();
                        extraContainer.innerHTML = `
                            <h3 style="margin-top:32px;margin-bottom:16px">Recent Campaigns</h3>
                            <div class="data-table-container">
                                <table class="data-table">
                                    <thead><tr><th>Campaign</th><th>Zone</th><th>Type</th><th>Cost</th><th>Status</th></tr></thead>
                                    <tbody>${recentCampaigns.length === 0 ? '<tr><td colspan="5" class="text-center p-4">No campaigns yet</td></tr>' : recentCampaigns.map(c => `
                                        <tr><td>${c.name}</td><td>${c.zoneName}</td><td>${c.type}</td><td>₹${(c.cost||0).toLocaleString()}</td><td><span class="status-badge status-${c.status}">${c.status}</span></td></tr>
                                    `).join('')}</tbody>
                                </table>
                            </div>`;
                    } else if (this.user.role === 'driver') {
                        const pendingTasks = CRMManager.getTasks(this.user.id, { status: 'pending' }).slice(0, 5);
                        extraContainer.innerHTML = `
                            <h3 style="margin-top:32px;margin-bottom:16px">Today's Tasks</h3>
                            ${pendingTasks.length === 0 ? '<p class="text-muted">No pending tasks</p>' : pendingTasks.map(t => `
                                <div class="task-card flex-between mb-2" style="padding:16px;background:var(--card);border-radius:12px;border:1px solid var(--border)">
                                    <div><strong>${t.title}</strong><p class="text-muted" style="font-size:12px">Due: ${t.dueDate}</p></div>
                                    <button class="btn btn-primary btn-sm" onclick="CRMManager.completeTask('${t.id}'); Notify.success('Task completed!'); DashboardPage.loadSection('tasks')">✓</button>
                                </div>
                            `).join('')}`;
                    }
                }
            },
            
            renderCampaigns() {
                const campaigns = CampaignManager.getCampaigns(this.user.id);
                const container = document.getElementById('campaigns-table-container');
                if (!container) return;
                
                container.innerHTML = campaigns.length === 0 ? `
                    <div class="text-center p-8">
                        <p style="font-size:48px;margin-bottom:16px">📢</p>
                        <h3>No campaigns yet</h3>
                        <p class="text-muted mb-4">Start your first rickshaw advertising campaign today!</p>
                        <a href="campaign.html" class="btn btn-primary btn-lg">+ Create Campaign</a>
                    </div>` : `
                    <table class="data-table">
                        <thead><tr><th>Campaign</th><th>Zone</th><th>Type</th><th>Rickshaws</th><th>Days</th><th>Start Date</th><th>Cost</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>${campaigns.reverse().map(c => `
                            <tr>
                                <td><strong>${c.name}</strong>${c.hashtag ? `<br><small style="color:var(--primary)">#${c.hashtag}</small>` : ''}</td>
                                <td>${c.zoneName}</td>
                                <td style="text-transform:uppercase">${c.type}</td>
                                <td>${c.quantity}</td>
                                <td>${c.days}</td>
                                <td>${new Date(c.startDate).toLocaleDateString()}</td>
                                <td><strong>₹${(c.cost||0).toLocaleString()}</strong></td>
                                <td><span class="status-badge status-${c.status}">${c.status}</span></td>
                                <td>
                                    <button class="btn btn-outline btn-sm" onclick="DashboardPage.viewCampaign('${c.id}')">View</button>
                                    ${c.status === 'active' ? `<button class="btn btn-danger btn-sm" onclick="DashboardPage.endCampaign('${c.id}')">End</button>` : ''}
                                </td>
                            </tr>
                        `).join('')}</tbody>
                    </table>`;
            },
            
            renderInvoices() {
                const invoices = InvoiceManager.getInvoices(this.user.id);
                const container = document.getElementById('invoices-table-container');
                if (!container) return;
                
                container.innerHTML = invoices.length === 0 ? '<p class="text-center p-8 text-muted">No invoices yet</p>' : `
                    <table class="data-table">
                        <thead><tr><th>Invoice #</th><th>Campaign</th><th>Amount</th><th>GST</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                        <tbody>${invoices.reverse().map(inv => `
                            <tr>
                                <td>${inv.invoiceNumber}</td>
                                <td>${inv.campaignName}</td>
                                <td>₹${inv.subtotal.toLocaleString()}</td>
                                <td>₹${inv.gst.toLocaleString()}</td>
                                <td><strong>₹${inv.total.toLocaleString()}</strong></td>
                                <td><span class="status-badge status-${inv.status}">${inv.status}</span></td>
                                <td>${new Date(inv.createdAt).toLocaleDateString()}</td>
                                <td>
                                    <button class="btn btn-outline btn-sm" onclick="InvoiceManager.downloadInvoice('${inv.id}')">📥</button>
                                    <button class="btn btn-outline btn-sm" onclick="InvoiceManager.printInvoice('${inv.id}')">🖨️</button>
                                </td>
                            </tr>
                        `).join('')}</tbody>
                    </table>`;
            },
            
            renderAnalytics() {
                const container = document.getElementById('analytics-widgets');
                if (!container) return;
                
                const stats = CampaignManager.getStats(this.user.role === 'admin' ? null : this.user.id);
                container.innerHTML = `
                    <div class="widget glass"><div class="widget-value">${stats.total}</div><div class="widget-title">Total Campaigns</div></div>
                    <div class="widget glass"><div class="widget-value">${stats.totalImpressions.toLocaleString()}</div><div class="widget-title">Total Impressions</div></div>
                    <div class="widget glass"><div class="widget-value">${stats.totalReach.toLocaleString()}</div><div class="widget-title">Total Reach</div></div>
                    <div class="widget glass"><div class="widget-value">₹${stats.totalCost.toLocaleString()}</div><div class="widget-title">Total Value</div></div>`;
                
                // Draw simple chart
                setTimeout(() => {
                    const canvas = document.getElementById('analytics-chart');
                    if (canvas && window.Dashboard) {
                        Dashboard.drawLineChart(canvas.getContext('2d'), canvas.parentElement.offsetWidth - 48, 300,
                            ['Jan','Feb','Mar','Apr','May','Jun'],
                            [120000,190000,150000,280000,220000,350000]);
                    }
                }, 200);
            },
            
            renderAffiliate() {
                const container = document.getElementById('affiliate-content');
                if (!container) return;
                
                const link = AffiliateManager.generateReferralLink(this.user.id);
                const commission = AffiliateManager.getCommission(this.user.id);
                const stats = AffiliateManager.getReferralStats(this.user.id);
                const leaderboard = AffiliateManager.getLeaderboard(5);
                
                container.innerHTML = `
                    <div class="wallet-card mb-6" style="padding:32px;border-radius:24px;background:linear-gradient(135deg,var(--primary),var(--accent-cyan));color:#FFF">
                        <h3>Available Balance</h3>
                        <div style="font-size:48px;font-weight:800;margin:12px 0">₹${commission.toLocaleString()}</div>
                        <button class="btn btn-outline" style="color:#FFF;border-color:#FFF" onclick="DashboardPage.requestWithdrawal()">💸 Withdraw</button>
                    </div>
                    <div class="quick-stats mb-6">
                        <div class="stat-card"><div class="stat-card-icon">🔗</div><div class="stat-card-value">${stats.clicks}</div><div class="stat-card-label">Clicks</div></div>
                        <div class="stat-card"><div class="stat-card-icon">👤</div><div class="stat-card-value">${stats.leads}</div><div class="stat-card-label">Leads</div></div>
                        <div class="stat-card"><div class="stat-card-icon">✅</div><div class="stat-card-value">${stats.conversions}</div><div class="stat-card-label">Conversions</div></div>
                    </div>
                    <div class="glass-card mb-4">
                        <h4>Your Referral Link</h4>
                        <div style="display:flex;gap:8px;margin-top:12px">
                            <input type="text" value="${link}" readonly style="flex:1;font-family:monospace">
                            <button class="btn btn-primary" onclick="navigator.clipboard.writeText('${link}'); Notify.success('Copied!')">Copy</button>
                        </div>
                    </div>
                    <h4>🏆 Leaderboard</h4>
                    ${leaderboard.map((l,i) => `
                        <div style="display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--border)">
                            <span style="font-weight:700;min-width:30px">#${i+1}</span>
                            <span style="flex:1">${l.name}</span>
                            <strong>₹${l.total.toLocaleString()}</strong>
                        </div>
                    `).join('')}`;
            },
            
            renderProfile() {
                const container = document.getElementById('profile-content');
                if (!container) return;
                
                container.innerHTML = `
                    <form onsubmit="return false">
                        <div class="form-group"><label>Name</label><input type="text" id="profile-name" value="${this.user.name || ''}"></div>
                        <div class="form-group"><label>Email</label><input type="email" value="${this.user.email || ''}" disabled></div>
                        <div class="form-group"><label>Phone</label><input type="tel" id="profile-phone" value="${this.user.phone || ''}"></div>
                        ${this.user.company !== undefined ? `<div class="form-group"><label>Company</label><input type="text" id="profile-company" value="${this.user.company || ''}"></div>` : ''}
                        <div class="form-group"><label>New Password (leave blank to keep current)</label><input type="password" id="profile-password" placeholder="Enter new password"></div>
                        <button type="button" class="btn btn-primary" onclick="DashboardPage.updateProfile()">Update Profile</button>
                    </form>`;
            },
            
            renderUsers() {
                const users = Auth.getAllUsers();
                const container = document.getElementById('users-table-container');
                if (!container) return;
                
                container.innerHTML = `
                    <table class="data-table">
                        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Phone</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
                        <tbody>${users.map(u => `
                            <tr>
                                <td><strong>${u.name}</strong></td>
                                <td>${u.email}</td>
                                <td style="text-transform:capitalize">${u.role}</td>
                                <td>${u.phone || 'N/A'}</td>
                                <td><span class="status-badge ${u.active ? 'status-active' : 'status-inactive'}">${u.active ? 'Active' : 'Inactive'}</span></td>
                                <td>${new Date(u.createdAt).toLocaleDateString()}</td>
                                <td><button class="btn btn-outline btn-sm" onclick="Auth.toggleUserStatus('${u.id}'); DashboardPage.loadSection('users')">Toggle</button></td>
                            </tr>
                        `).join('')}</tbody>
                    </table>`;
            },
            
            renderAllCampaigns() {
                const campaigns = CampaignManager.getCampaigns();
                const container = document.getElementById('all-campaigns-table-container');
                if (!container) return;
                
                container.innerHTML = `
                    <table class="data-table">
                        <thead><tr><th>Campaign</th><th>Client</th><th>Zone</th><th>Type</th><th>Qty</th><th>Cost</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody>${campaigns.reverse().slice(0, 50).map(c => `
                            <tr>
                                <td><strong>${c.name}</strong></td>
                                <td>${c.userName || 'N/A'}</td>
                                <td>${c.zoneName}</td>
                                <td>${c.type}</td>
                                <td>${c.quantity}</td>
                                <td>₹${(c.cost||0).toLocaleString()}</td>
                                <td><span class="status-badge status-${c.status}">${c.status}</span></td>
                                <td><button class="btn btn-danger btn-sm" onclick="DashboardPage.deleteCampaign('${c.id}')">🗑️</button></td>
                            </tr>
                        `).join('')}</tbody>
                    </table>`;
            },
            
            renderTasks() {
                const tasks = CRMManager.getTasks(this.user.id);
                const container = document.getElementById('tasks-container');
                if (!container) return;
                
                const pending = tasks.filter(t => t.status === 'pending');
                const completed = tasks.filter(t => t.status === 'completed');
                
                container.innerHTML = `
                    <h3>Pending (${pending.length})</h3>
                    ${pending.length === 0 ? '<p class="text-muted mb-6">No pending tasks</p>' : pending.map(t => `
                        <div class="task-card flex-between mb-3" style="padding:16px;background:var(--card);border-radius:12px;border:1px solid var(--border)">
                            <div><strong>${t.title}</strong><p class="text-muted" style="font-size:12px">Due: ${t.dueDate} | Priority: ${t.priority}</p>${t.notes ? `<p class="text-muted">${t.notes}</p>` : ''}</div>
                            <button class="btn btn-primary btn-sm" onclick="CRMManager.completeTask('${t.id}'); Notify.success('Task completed!'); DashboardPage.loadSection('tasks')">✓ Complete</button>
                        </div>
                    `).join('')}
                    <h3 style="margin-top:32px">Completed (${completed.length})</h3>
                    ${completed.slice(0, 10).map(t => `
                        <div style="padding:12px;opacity:0.7">✅ ${t.title} - <small>${new Date(t.completedAt).toLocaleDateString()}</small></div>
                    `).join('')}`;
            },
            
            renderCRM() {
                const container = document.getElementById('crm-content');
                if (!container) return;
                const pipelineStats = CRMManager.getPipelineStats();
                
                container.innerHTML = `
                    <div class="pipeline-container" style="display:flex;gap:16px;overflow-x:auto;padding-bottom:16px">
                        ${CRMManager.STATUSES.map(status => `
                            <div style="min-width:250px;background:var(--card);border-radius:16px;padding:16px;border:1px solid var(--border)">
                                <div style="display:flex;justify-content:space-between;margin-bottom:12px">
                                    <strong>${status}</strong>
                                    <span style="background:rgba(108,77,246,0.2);padding:2px 10px;border-radius:12px;font-size:12px">${(pipelineStats[status]||[]).length}</span>
                                </div>
                                ${(pipelineStats[status]||[]).slice(0,10).map(lead => `
                                    <div style="background:var(--bg);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer" onclick="DashboardPage.viewLead('${lead.id}')">
                                        <strong>${lead.name}</strong>
                                        <p style="font-size:12px;color:var(--text-secondary)">${lead.company||'N/A'}</p>
                                        ${lead.value>0?`<p style="font-size:12px;color:var(--primary)">₹${lead.value.toLocaleString()}</p>`:''}
                                    </div>
                                `).join('')}
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn btn-primary mt-4" onclick="DashboardPage.openNewLeadModal()">+ New Lead</button>`;
            },
            
            // =====================================================
            // ACTIONS
            // =====================================================
            
            viewCampaign(id) {
                Notify.info('Campaign ID: ' + id);
            },
            
            endCampaign(id) {
                Notify.confirm('End this campaign?', () => {
                    CampaignManager.updateCampaign(id, { status: 'completed' });
                    Notify.success('Campaign ended');
                    this.loadSection('campaigns');
                });
            },
            
            deleteCampaign(id) {
                Notify.confirm('Delete this campaign permanently?', () => {
                    CampaignManager.deleteCampaign(id);
                    Notify.success('Campaign deleted');
                    this.loadSection('all-campaigns');
                });
            },
            
            updateProfile() {
                const updates = {
                    name: document.getElementById('profile-name')?.value,
                    phone: document.getElementById('profile-phone')?.value,
                    company: document.getElementById('profile-company')?.value
                };
                const password = document.getElementById('profile-password')?.value;
                if (password) updates.password = password;
                
                if (Auth.updateProfile(updates)) {
                    Notify.success('Profile updated!');
                    this.user = Auth.getCurrentUser();
                    this.updateUserDisplay();
                }
            },
            
            requestWithdrawal() {
                const amount = prompt('Enter withdrawal amount (min ₹500):');
                if (!amount) return;
                const result = AffiliateManager.requestWithdrawal(this.user.id, parseInt(amount));
                if (result.success) {
                    Notify.success('Withdrawal requested!');
                } else {
                    Notify.error(result.message);
                }
            },
            
            viewLead(id) {
                const lead = CRMManager.getAllLeads().find(l => l.id === id);
                if (lead) Notify.info(`${lead.name} - ${lead.status} - ₹${(lead.value||0).toLocaleString()}`);
            },
            
            openNewLeadModal() {
                const name = prompt('Lead Name:');
                if (!name) return;
                const phone = prompt('Phone:');
                const company = prompt('Company (optional):');
                CRMManager.createLead({ name, phone: phone || '', company: company || '', assignedTo: this.user.id });
                Notify.success('Lead created!');
                this.loadSection('crm');
            }
        };
        
        // Initialize on DOM ready
        document.addEventListener('DOMContentLoaded', () => DashboardPage.init());
        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            DashboardPage.init();
        }
    </script>
</body>
</html>
