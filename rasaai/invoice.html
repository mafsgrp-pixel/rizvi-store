<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
    <meta name="theme-color" content="#6C4DF6">
    <title>Invoice - RASAAI Outdoor Advertising Network</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://rizvi.store/rasaai/invoice.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C4DF6'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-weight='bold'>R</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .invoice-page{min-height:100vh;background:var(--bg);padding:20px;padding-bottom:100px}
        body.dark-mode .invoice-page{background:var(--dark-bg)}
        .invoice-container{max-width:900px;margin:0 auto}
        .invoice-paper{background:#FFF;border-radius:16px;padding:40px;box-shadow:var(--shadow);color:#111}
        @media print{body{background:#FFF!important;padding:0!important}.invoice-paper{box-shadow:none;border-radius:0;padding:20px}.no-print,.bottom-nav,.app-header{display:none!important}}
        .inv-header{display:flex;justify-content:space-between;margin-bottom:30px;padding-bottom:20px;border-bottom:3px solid #6C4DF6;flex-wrap:wrap;gap:20px}
        .inv-company{font-size:28px;font-weight:900;color:#6C4DF6}
        .inv-company-details{font-size:12px;color:#666;margin-top:4px}
        .inv-title{font-size:32px;font-weight:800;text-align:right}
        .inv-number{font-size:14px;color:#666;text-align:right}
        .inv-section{margin-bottom:25px}
        .inv-section h4{font-size:13px;font-weight:700;text-transform:uppercase;color:#6C4DF6;margin-bottom:8px;letter-spacing:0.5px}
        .inv-section p{font-size:13px;line-height:1.7}
        table.inv-table{width:100%;border-collapse:collapse;margin:15px 0}
        table.inv-table th{background:#F5F5F5;padding:10px 12px;text-align:left;font-size:12px;font-weight:700;text-transform:uppercase;border-bottom:1px solid #DDD}
        table.inv-table td{padding:10px 12px;border-bottom:1px solid #EEE;font-size:13px}
        .inv-totals{text-align:right;margin-top:20px}
        .inv-totals p{font-size:13px;line-height:2.2}
        .inv-totals .grand{font-size:22px;font-weight:800;color:#6C4DF6;border-top:2px solid #6C4DF6;padding-top:10px;margin-top:8px}
        .inv-footer{margin-top:30px;padding-top:15px;border-top:1px solid #DDD;font-size:11px;color:#999;text-align:center}
        .status-paid{background:#D4EDDA;color:#155724;padding:4px 14px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;display:inline-block}
        .status-pending{background:#FFF3CD;color:#856404;padding:4px 14px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;display:inline-block}
        .btn-row{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
        .back-link{display:inline-flex;align-items:center;gap:8px;color:var(--primary);font-weight:500;margin-bottom:20px;text-decoration:none}
    </style>
</head>
<body>
    <div class="invoice-page">
        <div class="invoice-container">
            <header class="app-header no-print">
                <button class="back-btn" onclick="history.back()">←</button>
                <span class="title">Invoice</span>
                <button class="action-btn theme-toggle" onclick="App.applyTheme(App.state.theme==='light'?'dark':'light')">🌙</button>
            </header>

            <a href="dashboard.html" class="back-link no-print" style="margin-top:20px">← Back to Dashboard</a>

            <div class="invoice-paper" id="invoice-content">
                <p style="text-align:center;padding:60px;color:#666">Loading invoice...</p>
            </div>

            <div class="btn-row no-print" id="action-buttons" style="display:none">
                <button class="btn btn-primary btn-lg" onclick="downloadPDF()">📥 Download PDF</button>
                <button class="btn btn-outline btn-lg" onclick="window.print()">🖨️ Print</button>
                <button class="btn btn-outline btn-lg" onclick="shareWhatsApp()">💬 Share via WhatsApp</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav no-print">
        <a href="index.html" class="bottom-nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
        <a href="campaign.html" class="bottom-nav-item"><span class="nav-icon">📢</span><span class="nav-label">Campaigns</span></a>
        <a href="campaign.html" class="bottom-nav-fab"><span>➕</span></a>
        <a href="analytics.html" class="bottom-nav-item"><span class="nav-icon">📊</span><span class="nav-label">Stats</span></a>
        <a href="dashboard.html" class="bottom-nav-item"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
    </nav>

    <div id="notification-container" class="notification-container" aria-live="polite" role="status"></div>

    <script src="app.js"></script>
    <script>
        let currentInvoice = null;

        document.addEventListener('DOMContentLoaded', () => {
            const user = Auth.getCurrentUser();
            if (!user) { window.location.href = 'login.html?redirect=invoice.html'; return; }

            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                renderInvoice(id);
            } else {
                renderInvoiceList(user);
            }
        });

        function renderInvoice(id) {
            const inv = InvoiceManager.getInvoiceById(id);
            if (!inv) {
                document.getElementById('invoice-content').innerHTML = '<div style="text-align:center;padding:60px"><h3>Invoice Not Found</h3><p class="text-muted">The invoice you are looking for does not exist.</p><a href="dashboard.html" class="btn btn-primary mt-4">Go to Dashboard</a></div>';
                return;
            }
            currentInvoice = inv;
            document.getElementById('action-buttons').style.display = 'flex';

            document.getElementById('invoice-content').innerHTML = `
                <div class="inv-header">
                    <div>
                        <div class="inv-company">RASAAI</div>
                        <div class="inv-company-details">Mumbra Rickshaw Advertising Network</div>
                        <div class="inv-company-details">hello@rasaai.com | +91 9594306625</div>
                        <div class="inv-company-details">Mumbra, Thane, Maharashtra - 400612</div>
                        <div class="inv-company-details">GST: 27AAAAA0000A1Z5</div>
                    </div>
                    <div>
                        <div class="inv-title">TAX INVOICE</div>
                        <div class="inv-number">${inv.invoiceNumber}</div>
                        <div style="margin-top:8px"><span class="${inv.status === 'paid' ? 'status-paid' : 'status-pending'}">${inv.status.toUpperCase()}</span></div>
                    </div>
                </div>

                <div style="display:flex;justify-content:space-between;margin-bottom:25px;flex-wrap:wrap;gap:20px">
                    <div class="inv-section">
                        <h4>Bill To</h4>
                        <p><strong>${inv.customerName}</strong></p>
                        ${inv.customerCompany ? `<p>${inv.customerCompany}</p>` : ''}
                        ${inv.customerEmail ? `<p>${inv.customerEmail}</p>` : ''}
                        ${inv.customerPhone ? `<p>${inv.customerPhone}</p>` : ''}
                        ${inv.customerGST ? `<p>GST: ${inv.customerGST}</p>` : ''}
                    </div>
                    <div class="inv-section" style="text-align:right">
                        <h4>Invoice Details</h4>
                        <p>Date: ${new Date(inv.createdAt).toLocaleDateString('en-IN', {day:'numeric', month:'long', year:'numeric'})}</p>
                        <p>Due Date: ${new Date(inv.dueDate).toLocaleDateString('en-IN', {day:'numeric', month:'long', year:'numeric'})}</p>
                        ${inv.paidAt ? `<p>Paid On: ${new Date(inv.paidAt).toLocaleDateString('en-IN', {day:'numeric', month:'long', year:'numeric'})}</p>` : ''}
                        ${inv.paymentMethod ? `<p>Payment: ${inv.paymentMethod.toUpperCase()}</p>` : ''}
                    </div>
                </div>

                <div class="inv-section">
                    <h4>Campaign Details</h4>
                    <table class="inv-table">
                        <thead><tr><th>Description</th><th>Zone</th><th>Type</th><th>Qty</th><th>Days</th><th>Rate/Day</th><th>Amount</th></tr></thead>
                        <tbody>
                            <tr>
                                <td>${inv.campaignName}</td>
                                <td>${inv.zone}</td>
                                <td>${inv.campaignType?.toUpperCase()}</td>
                                <td>${inv.quantity} Rickshaws</td>
                                <td>${inv.days}</td>
                                <td>₹${Math.round(inv.subtotal / (inv.quantity * inv.days))}</td>
                                <td>₹${inv.subtotal.toLocaleString()}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="inv-totals">
                    <p>Subtotal: ₹${inv.subtotal.toLocaleString()}</p>
                    <p>CGST (9%): ₹${Math.round(inv.gst/2).toLocaleString()}</p>
                    <p>SGST (9%): ₹${Math.round(inv.gst/2).toLocaleString()}</p>
                    <p>Total GST: ₹${inv.gst.toLocaleString()}</p>
                    <p class="grand">Total: ₹${inv.total.toLocaleString()}</p>
                </div>

                <div class="inv-footer">
                    <p>Thank you for choosing RASAAI - Advertise on Moving Rickshaws!</p>
                    <p>This is a computer-generated invoice. For queries: hello@rasaai.com | +91 9594306625</p>
                </div>
            `;
        }

        function renderInvoiceList(user) {
            const invoices = InvoiceManager.getInvoices(user.id);
            document.getElementById('invoice-content').innerHTML = `
                <h2 style="margin-bottom:24px">🧾 My Invoices (${invoices.length})</h2>
                ${invoices.length === 0 ? '<div class="empty-state"><span class="empty-icon">🧾</span><h3>No Invoices Yet</h3><p>Invoices are generated when you book campaigns.</p><a href="campaign.html" class="btn btn-primary">Book a Campaign</a></div>' : 
                invoices.reverse().map(inv => `
                    <div style="background:var(--card);border-radius:16px;padding:20px;margin-bottom:12px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
                        <div>
                            <strong style="font-size:16px">${inv.invoiceNumber}</strong>
                            <p style="font-size:13px;color:var(--text-secondary);margin-top:4px">${inv.campaignName} | ${inv.zone} | ${new Date(inv.createdAt).toLocaleDateString()}</p>
                        </div>
                        <div style="text-align:right">
                            <strong style="font-size:18px">₹${inv.total.toLocaleString()}</strong>
                            <br><span class="${inv.status === 'paid' ? 'status-paid' : 'status-pending'}">${inv.status}</span>
                        </div>
                        <a href="?id=${inv.id}" class="btn btn-outline btn-sm">View →</a>
                    </div>
                `).join('')}
            `;
        }

        function downloadPDF() {
            if (currentInvoice) InvoiceManager.downloadInvoicePDF(currentInvoice.id);
        }

        function shareWhatsApp() {
            if (!currentInvoice) return;
            const msg = encodeURIComponent(`RASAAI Invoice ${currentInvoice.invoiceNumber}\nAmount: ₹${currentInvoice.total.toLocaleString()}\nStatus: ${currentInvoice.status}\n\nPay via PhonePe/UPI: 9594306625@ybl`);
            window.open(`https://wa.me/919594306625?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
