<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
    <meta name="theme-color" content="#6C4DF6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0F1117" media="(prefers-color-scheme: dark)">
    <meta name="color-scheme" content="light dark">
    
    <title>Login - RASAAI Outdoor Advertising Network</title>
    <meta name="description" content="Login to your RASAAI account. Access your dashboard, campaigns, analytics, and more.">
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="canonical" href="https://rizvi.store/rasaai/login.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C4DF6'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-weight='bold'>R</text></svg>">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rizvi.store/rasaai/login.html">
    <meta property="og:title" content="Login - RASAAI">
    <meta property="og:site_name" content="RASAAI">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Login page specific styles */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            background: var(--bg);
        }
        body.dark-mode .login-page {
            background: var(--dark-bg);
        }
        .login-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }
        .login-card {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        body.dark-mode .login-card {
            background: var(--dark-card);
            border-color: var(--dark-border);
            box-shadow: var(--dark-shadow);
        }
        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .login-logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--accent-cyan));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFF;
            font-size: 24px;
            font-weight: 900;
        }
        .login-logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 14px;
        }
        body.dark-mode .login-subtitle {
            color: var(--dark-muted);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text);
        }
        body.dark-mode .form-group label {
            color: var(--dark-text);
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            padding-right: 44px;
            font-size: 16px;
        }
        .input-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--text-secondary);
            pointer-events: none;
        }
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-secondary);
            padding: 4px;
        }
        .password-toggle:hover {
            color: var(--primary);
        }
        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .remember-row label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .remember-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        .forgot-link {
            color: var(--primary);
            font-weight: 500;
            cursor: pointer;
        }
        .forgot-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
        body.dark-mode .forgot-link {
            color: var(--dark-primary);
        }
        .register-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .register-link a {
            color: var(--primary);
            font-weight: 600;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        body.dark-mode .register-link {
            color: var(--dark-muted);
        }
        body.dark-mode .register-link a {
            color: var(--dark-primary);
        }
        .error-message {
            background: rgba(255,77,109,0.1);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            border: 1px solid rgba(255,77,109,0.2);
        }
        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-4px); }
        }
        .success-message {
            background: rgba(0,200,150,0.1);
            color: var(--success);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            border: 1px solid rgba(0,200,150,0.2);
        }
        .success-message.show {
            display: block;
        }
        .demo-accounts {
            margin-top: 24px;
            padding: 16px;
            background: rgba(108,77,246,0.05);
            border-radius: var(--radius-md);
            border: 1px solid rgba(108,77,246,0.1);
        }
        body.dark-mode .demo-accounts {
            background: rgba(139,124,255,0.05);
            border-color: rgba(139,124,255,0.1);
        }
        .demo-accounts summary {
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            color: var(--primary);
            margin-bottom: 8px;
        }
        body.dark-mode .demo-accounts summary {
            color: var(--dark-primary);
        }
        .demo-account {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 12px;
            border-bottom: 1px solid var(--border);
        }
        body.dark-mode .demo-account {
            border-bottom-color: var(--dark-border);
        }
        .demo-account:last-child {
            border-bottom: none;
        }
        .demo-account .role {
            font-weight: 600;
            text-transform: capitalize;
            color: var(--primary);
            min-width: 60px;
        }
        body.dark-mode .demo-account .role {
            color: var(--dark-primary);
        }
        .demo-account .email {
            color: var(--text-secondary);
            flex: 1;
            margin: 0 8px;
        }
        .demo-account .btn-sm {
            padding: 4px 10px;
            font-size: 11px;
            min-height: 28px;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #FFF;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <!-- Background Glows -->
        <div class="background-glow glow-primary" style="width:500px;height:500px;top:-30%;left:-20%" aria-hidden="true"></div>
        <div class="background-glow glow-accent" style="width:400px;height:400px;bottom:-20%;right:-10%" aria-hidden="true"></div>
        
        <div class="login-container">
            <div class="login-card">
                <!-- Logo -->
                <div class="login-logo">
                    <div class="login-logo-icon" aria-hidden="true">R</div>
                    <span class="login-logo-text">RASAAI</span>
                </div>
                <p class="login-subtitle">Sign in to your account to continue</p>
                
                <!-- Error Message -->
                <div class="error-message" id="login-error" role="alert"></div>
                
                <!-- Success Message -->
                <div class="success-message" id="login-success" role="status"></div>
                
                <!-- Login Form -->
                <form id="login-form" onsubmit="return false;" novalidate>
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="login-email" placeholder="Enter your email" required autocomplete="email" autofocus>
                            <span class="input-icon" aria-hidden="true">📧</span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                            <button type="button" class="password-toggle" id="password-toggle" aria-label="Show password" onclick="LoginPage.togglePassword()">👁️</button>
                        </div>
                    </div>
                    
                    <div class="remember-row">
                        <label>
                            <input type="checkbox" id="remember-me" checked>
                            <span>Remember me</span>
                        </label>
                        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-submit-btn">
                        <span id="login-btn-text">🔐 Sign In</span>
                    </button>
                </form>
                
                <p class="register-link">
                    Don't have an account? <a href="register.html">Create one</a>
                </p>
                
                <!-- Demo Accounts -->
                <details class="demo-accounts">
                    <summary>🔑 Demo Login Credentials (Click to expand)</summary>
                    <div style="margin-top:8px">
                        <div class="demo-account">
                            <span class="role">👑 Admin</span>
                            <span class="email">admin@rasaai.com</span>
                            <button class="btn btn-primary btn-sm" onclick="LoginPage.fillDemo('admin@rasaai.com','admin123')">Fill</button>
                        </div>
                        <div class="demo-account">
                            <span class="role">👤 Client</span>
                            <span class="email">client@rasaai.com</span>
                            <button class="btn btn-primary btn-sm" onclick="LoginPage.fillDemo('client@rasaai.com','client123')">Fill</button>
                        </div>
                        <div class="demo-account">
                            <span class="role">🛺 Driver</span>
                            <span class="email">driver@rasaai.com</span>
                            <button class="btn btn-primary btn-sm" onclick="LoginPage.fillDemo('driver@rasaai.com','driver123')">Fill</button>
                        </div>
                        <div class="demo-account">
                            <span class="role">🔗 Affiliate</span>
                            <span class="email">affiliate@rasaai.com</span>
                            <button class="btn btn-primary btn-sm" onclick="LoginPage.fillDemo('affiliate@rasaai.com','affiliate123')">Fill</button>
                        </div>
                        <div class="demo-account">
                            <span class="role">📊 Sales</span>
                            <span class="email">sales@rasaai.com</span>
                            <button class="btn btn-primary btn-sm" onclick="LoginPage.fillDemo('sales@rasaai.com','sales123')">Fill</button>
                        </div>
                    </div>
                </details>
            </div>
        </div>
    </div>
    
    <!-- Notification Container -->
    <div id="notification-container" class="notification-container" aria-live="polite" role="status"></div>
    
    <script src="app.js"></script>
    <script>
        // Login Page Controller
        const LoginPage = {
            init() {
                // Check if already logged in
                const user = Auth.getCurrentUser();
                if (user) {
                    this.redirectBasedOnRole(user);
                    return;
                }
                
                // Check for remembered email
                const remembered = Storage.get('rememberedEmail');
                if (remembered) {
                    document.getElementById('login-email').value = remembered;
                }
                
                // Check for redirect parameter
                const params = new URLSearchParams(window.location.search);
                this.redirectUrl = params.get('redirect') || '';
                
                // Check for referral code
                const refCode = params.get('ref');
                if (refCode) {
                    Storage.set('referralCode', refCode);
                }
                
                // Form submit
                document.getElementById('login-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();
                });
                
                // Enter key
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && document.activeElement?.tagName !== 'BUTTON') {
                        this.handleLogin();
                    }
                });
            },
            
            handleLogin() {
                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;
                const remember = document.getElementById('remember-me').checked;
                const errorEl = document.getElementById('login-error');
                const submitBtn = document.getElementById('login-submit-btn');
                const btnText = document.getElementById('login-btn-text');
                
                // Validation
                if (!email) {
                    this.showError('Please enter your email address');
                    document.getElementById('login-email').focus();
                    return;
                }
                if (!this.isValidEmail(email)) {
                    this.showError('Please enter a valid email address');
                    document.getElementById('login-email').focus();
                    return;
                }
                if (!password) {
                    this.showError('Please enter your password');
                    document.getElementById('login-password').focus();
                    return;
                }
                if (password.length < 6) {
                    this.showError('Password must be at least 6 characters');
                    document.getElementById('login-password').focus();
                    return;
                }
                
                // Clear error
                this.hideError();
                
                // Show loading
                submitBtn.disabled = true;
                btnText.innerHTML = '<span class="loading-spinner"></span> Signing in...';
                
                // Simulate network delay for UX
                setTimeout(() => {
                    const result = Auth.login(email, password);
                    
                    if (result.success) {
                        // Remember email
                        if (remember) {
                            Storage.set('rememberedEmail', email);
                        } else {
                            Storage.remove('rememberedEmail');
                        }
                        
                        // Handle referral code
                        const refCode = Storage.get('referralCode');
                        if (refCode) {
                            AffiliateManager.trackLead(refCode);
                        }
                        
                        // Show success
                        const successEl = document.getElementById('login-success');
                        successEl.textContent = '✅ Login successful! Redirecting...';
                        successEl.classList.add('show');
                        btnText.textContent = '✅ Success!';
                        
                        // Redirect
                        setTimeout(() => {
                            this.redirectBasedOnRole(result.user);
                        }, 800);
                        
                    } else {
                        this.showError(result.message || 'Invalid credentials');
                        submitBtn.disabled = false;
                        btnText.textContent = '🔐 Sign In';
                        
                        // Shake the card
                        const card = document.querySelector('.login-card');
                        card.style.animation = 'shake 0.5s ease';
                        setTimeout(() => card.style.animation = '', 500);
                    }
                }, 600);
            },
            
            redirectBasedOnRole(user) {
                // If there's a redirect URL, go there
                if (this.redirectUrl) {
                    window.location.href = this.redirectUrl;
                    return;
                }
                
                // Otherwise redirect based on role
                switch (user.role) {
                    case 'admin':
                        window.location.href = 'admin.html';
                        break;
                    case 'client':
                        window.location.href = 'client.html';
                        break;
                    case 'driver':
                        window.location.href = 'driver.html';
                        break;
                    case 'affiliate':
                        window.location.href = 'affiliate.html';
                        break;
                    case 'sales':
                        window.location.href = 'crm.html';
                        break;
                    default:
                        window.location.href = 'dashboard.html';
                }
            },
            
            togglePassword() {
                const input = document.getElementById('login-password');
                const btn = document.getElementById('password-toggle');
                if (input.type === 'password') {
                    input.type = 'text';
                    btn.textContent = '🙈';
                    btn.setAttribute('aria-label', 'Hide password');
                } else {
                    input.type = 'password';
                    btn.textContent = '👁️';
                    btn.setAttribute('aria-label', 'Show password');
                }
            },
            
            fillDemo(email, password) {
                document.getElementById('login-email').value = email;
                document.getElementById('login-password').value = password;
                document.getElementById('login-email').focus();
                Notify.info(`Filled: ${email}`);
            },
            
            showError(message) {
                const el = document.getElementById('login-error');
                el.textContent = '❌ ' + message;
                el.classList.add('show');
            },
            
            hideError() {
                const el = document.getElementById('login-error');
                el.classList.remove('show');
                el.textContent = '';
            },
            
            isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }
        };
        
        // Initialize on DOM ready
        document.addEventListener('DOMContentLoaded', () => {
            LoginPage.init();
        });
        
        // Also init if app.js is already loaded
        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            LoginPage.init();
        }
    </script>
</body>
</html>
