<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6C4DF6">
    <title>Login - RASAAI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C4DF6'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-weight='bold'>R</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',system-ui,-apple-system,sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#F7F8FC;
            padding:20px;
        }
        .login-box{
            background:#fff;
            border-radius:24px;
            padding:40px 30px;
            width:100%;
            max-width:420px;
            box-shadow:0 20px 60px rgba(0,0,0,0.1);
            border:1px solid rgba(0,0,0,0.06);
        }
        .logo-area{text-align:center;margin-bottom:24px}
        .logo-icon{
            width:56px;height:56px;
            background:linear-gradient(135deg,#6C4DF6,#00D4FF);
            border-radius:16px;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            font-size:28px;
            font-weight:900;
            margin-bottom:10px;
        }
        .logo-text{
            font-size:26px;
            font-weight:800;
            background:linear-gradient(135deg,#6C4DF6,#00D4FF);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .subtitle{text-align:center;color:#6B7280;font-size:14px;margin-bottom:24px}
        .input-group{margin-bottom:16px}
        .input-group label{display:block;font-weight:600;font-size:13px;margin-bottom:6px;color:#111827}
        .input-group input{
            width:100%;
            padding:14px 16px;
            border:1px solid #ddd;
            border-radius:14px;
            font-size:16px;
            outline:none;
            transition:0.2s;
            background:#fff;
        }
        .input-group input:focus{border-color:#6C4DF6;box-shadow:0 0 0 3px rgba(108,77,246,0.1)}
        .flex-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:13px}
        .flex-row label{display:flex;align-items:center;gap:6px;color:#6B7280;cursor:pointer}
        .flex-row a{color:#6C4DF6;text-decoration:none;font-weight:500}
        .submit-btn{
            width:100%;
            padding:15px;
            background:linear-gradient(135deg,#6C4DF6,#8A63FF);
            color:#fff;
            border:none;
            border-radius:14px;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 8px 24px rgba(108,77,246,0.3);
            transition:0.3s;
        }
        .submit-btn:hover{transform:scale(1.02)}
        .submit-btn:disabled{opacity:0.6;cursor:wait;transform:none}
        .message{padding:12px 16px;border-radius:12px;font-size:13px;margin-bottom:16px;display:none;text-align:center}
        .message.error{background:#FFF0F0;color:#E53E3E;border:1px solid #FECACA;display:block}
        .message.success{background:#F0FFF4;color:#38A169;border:1px solid #C6F6D5;display:block}
        .bottom-text{text-align:center;margin-top:20px;font-size:14px;color:#6B7280}
        .bottom-text a{color:#6C4DF6;font-weight:600;text-decoration:none}
        .demo-box{margin-top:20px;padding:16px;background:#F8F7FF;border-radius:14px;border:1px solid #E8E5FF}
        .demo-box summary{font-weight:600;font-size:13px;cursor:pointer;color:#6C4DF6}
        .demo-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:12px}
        .demo-item:last-child{border-bottom:none}
        .demo-role{font-weight:600;color:#6C4DF6;min-width:70px}
        .demo-email{flex:1;margin:0 8px;color:#666;font-size:11px}
        .demo-btn{padding:4px 10px;background:#6C4DF6;color:#fff;border:none;border-radius:8px;font-size:10px;cursor:pointer;font-weight:600}
        .demo-btn:hover{background:#8A63FF}
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-area">
            <div class="logo-icon">R</div>
            <div class="logo-text">RASAAI</div>
        </div>
        <p class="subtitle">Sign in to your account</p>
        
        <div class="message" id="msg"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required autocomplete="email" autofocus>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <div class="flex-row">
                <label><input type="checkbox" id="remember"> Remember me</label>
                <a href="forgot-password.html">Forgot password?</a>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">🔐 Sign In</button>
        </form>
        
        <p class="bottom-text">Don't have an account? <a href="register.html">Create one</a></p>
        
        <details class="demo-box">
            <summary>🔑 Demo Login Credentials</summary>
            <div style="margin-top:10px">
                <div class="demo-item">
                    <span class="demo-role">👑 Admin</span>
                    <span class="demo-email">admin@rasaai.com</span>
                    <button class="demo-btn" onclick="fillDemo('admin@rasaai.com','admin123')">Fill</button>
                </div>
                <div class="demo-item">
                    <span class="demo-role">👤 Client</span>
                    <span class="demo-email">client@rasaai.com</span>
                    <button class="demo-btn" onclick="fillDemo('client@rasaai.com','client123')">Fill</button>
                </div>
                <div class="demo-item">
                    <span class="demo-role">🛺 Driver</span>
                    <span class="demo-email">driver@rasaai.com</span>
                    <button class="demo-btn" onclick="fillDemo('driver@rasaai.com','driver123')">Fill</button>
                </div>
                <div class="demo-item">
                    <span class="demo-role">🔗 Affiliate</span>
                    <span class="demo-email">affiliate@rasaai.com</span>
                    <button class="demo-btn" onclick="fillDemo('affiliate@rasaai.com','affiliate123')">Fill</button>
                </div>
                <div class="demo-item">
                    <span class="demo-role">📊 Sales</span>
                    <span class="demo-email">sales@rasaai.com</span>
                    <button class="demo-btn" onclick="fillDemo('sales@rasaai.com','sales123')">Fill</button>
                </div>
            </div>
        </details>
    </div>

    <script>
        // =====================================================
        // DEMO USERS - Hardcoded database
        // =====================================================
        var DEMO_USERS = [
            { id:'ADM001',name:'Admin User',email:'admin@rasaai.com',password:'admin123',role:'admin',phone:'9876543210',active:true },
            { id:'CLI001',name:'Rahul Sharma',email:'client@rasaai.com',password:'client123',role:'client',phone:'9876543211',active:true,company:'Mumbra Pizza House' },
            { id:'DRV001',name:'Salman Khan',email:'driver@rasaai.com',password:'driver123',role:'driver',phone:'9876543212',active:true,zone:'mumbra-station',rickshawId:'RICK001' },
            { id:'AFF001',name:'Priya Patel',email:'affiliate@rasaai.com',password:'affiliate123',role:'affiliate',phone:'9876543213',active:true },
            { id:'SAL001',name:'Amit Verma',email:'sales@rasaai.com',password:'sales123',role:'sales',phone:'9876543214',active:true }
        ];

        // =====================================================
        // LOCAL STORAGE HELPERS
        // =====================================================
        function save(key, value) {
            try { localStorage.setItem('rasaai_' + key, JSON.stringify(value)); } catch(e) {}
        }
        function load(key, def) {
            try { var d = localStorage.getItem('rasaai_' + key); return d ? JSON.parse(d) : def; } catch(e) { return def; }
        }

        // Seed users on first visit
        if (load('users', []).length === 0) {
            save('users', DEMO_USERS);
        }

        // =====================================================
        // FILL DEMO - Called by demo buttons
        // =====================================================
        function fillDemo(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
            document.getElementById('email').focus();
        }

        // =====================================================
        // REDIRECT BY ROLE
        // =====================================================
        function goToDashboard(role) {
            var pages = {
                'admin': 'admin.html',
                'client': 'client.html',
                'driver': 'driver.html',
                'affiliate': 'affiliate.html',
                'sales': 'crm.html'
            };
            var url = pages[role] || 'dashboard.html';
            window.location.href = url;
        }

        // =====================================================
        // SHOW MESSAGE
        // =====================================================
        function showMsg(text, type) {
            var m = document.getElementById('msg');
            m.textContent = text;
            m.className = 'message ' + type;
        }
        function hideMsg() {
            var m = document.getElementById('msg');
            m.className = 'message';
            m.textContent = '';
        }

        // =====================================================
        // FORM SUBMIT HANDLER
        // =====================================================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var email = document.getElementById('email').value.trim().toLowerCase();
            var password = document.getElementById('password').value;
            var remember = document.getElementById('remember').checked;
            var btn = document.getElementById('submitBtn');
            
            hideMsg();
            
            // Validate
            if (!email) { showMsg('Please enter your email address', 'error'); return; }
            if (!password) { showMsg('Please enter your password', 'error'); return; }
            
            // Loading state
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            
            // Process login (small delay for UX)
            setTimeout(function() {
                var users = load('users', DEMO_USERS);
                var found = null;
                
                // Find user
                for (var i = 0; i < users.length; i++) {
                    if (users[i].email === email && users[i].password === password) {
                        found = users[i];
                        break;
                    }
                }
                
                if (!found) {
                    showMsg('Invalid email or password. Try: admin@rasaai.com / admin123', 'error');
                    btn.disabled = false;
                    btn.textContent = '🔐 Sign In';
                    return;
                }
                
                if (!found.active) {
                    showMsg('Account deactivated. Contact admin.', 'error');
                    btn.disabled = false;
                    btn.textContent = '🔐 Sign In';
                    return;
                }
                
                // SUCCESS - Save session
                var sessionUser = {
                    id: found.id,
                    name: found.name,
                    email: found.email,
                    role: found.role,
                    phone: found.phone,
                    company: found.company || '',
                    zone: found.zone || '',
                    rickshawId: found.rickshawId || '',
                    active: found.active
                };
                
                save('currentUser', sessionUser);
                
                if (remember) {
                    save('rememberedEmail', email);
                }
                
                showMsg('Login successful! Redirecting...', 'success');
                btn.textContent = 'Success!';
                
                // Redirect after short delay
                setTimeout(function() {
                    goToDashboard(found.role);
                }, 600);
                
            }, 400);
        });

        // =====================================================
        // AUTO-REDIRECT IF ALREADY LOGGED IN
        // =====================================================
        (function() {
            var user = load('currentUser', null);
            if (user && user.role) {
                var params = new URLSearchParams(window.location.search);
                var redirect = params.get('redirect');
                if (redirect) {
                    window.location.href = redirect;
                } else {
                    goToDashboard(user.role);
                }
            }
            
            // Pre-fill remembered email
            var remembered = load('rememberedEmail', '');
            if (remembered) {
                document.getElementById('email').value = remembered;
            }
        })();
    </script>
</body>
</html>
