<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
    <meta name="theme-color" content="#6C4DF6">
    <title>Login - RASAAI Outdoor Advertising Network</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://rizvi.store/rasaai/login.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C4DF6'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-weight='bold'>R</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',system-ui,sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#F7F8FC;
            padding:20px;
        }
        body.dark-mode{background:#0F1117}
        .login-container{width:100%;max-width:440px;position:relative;z-index:1}
        .login-card{
            background:#fff;
            border-radius:24px;
            padding:40px 32px;
            border:1px solid rgba(0,0,0,0.08);
            box-shadow:0 20px 60px rgba(0,0,0,0.08);
        }
        body.dark-mode .login-card{
            background:rgba(25,30,42,0.95);
            border-color:rgba(255,255,255,0.08);
            box-shadow:0 20px 60px rgba(0,0,0,0.5);
        }
        .login-logo{text-align:center;margin-bottom:8px}
        .login-logo .icon{
            width:56px;height:56px;
            background:linear-gradient(135deg,#6C4DF6,#00D4FF);
            border-radius:16px;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            color:#FFF;
            font-size:28px;
            font-weight:900;
            margin-bottom:12px;
        }
        .login-logo h1{
            font-size:28px;
            font-weight:800;
            background:linear-gradient(135deg,#6C4DF6,#00D4FF);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
        }
        .login-subtitle{text-align:center;color:#6B7280;margin-bottom:28px;font-size:14px}
        body.dark-mode .login-subtitle{color:#9AA3B2}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;font-weight:600;margin-bottom:6px;font-size:13px;color:#111827}
        body.dark-mode .form-group label{color:#fff}
        .form-group input{
            width:100%;
            padding:14px 16px;
            font-size:16px;
            border-radius:14px;
            border:1px solid rgba(0,0,0,0.1);
            background:#fff;
            color:#111827;
            outline:none;
            transition:all 0.2s;
        }
        .form-group input:focus{border-color:#6C4DF6;box-shadow:0 0 0 4px rgba(108,77,246,0.1)}
        body.dark-mode .form-group input{
            background:rgba(25,30,42,0.9);
            border-color:rgba(255,255,255,0.08);
            color:#fff;
        }
        .remember-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:13px}
        .remember-row label{display:flex;align-items:center;gap:8px;color:#6B7280;cursor:pointer}
        body.dark-mode .remember-row label{color:#9AA3B2}
        .remember-row a{color:#6C4DF6;font-weight:500;text-decoration:none}
        .btn-login{
            width:100%;
            padding:15px;
            background:linear-gradient(135deg,#6C4DF6,#8A63FF);
            color:#fff;
            border:none;
            border-radius:14px;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
            transition:all 0.3s;
            box-shadow:0 8px 24px rgba(108,77,246,0.3);
        }
        .btn-login:hover{transform:scale(1.02);box-shadow:0 12px 32px rgba(108,77,246,0.5)}
        .btn-login:disabled{opacity:0.7;cursor:not-allowed;transform:none}
        .error-msg{
            background:rgba(255,77,109,0.1);
            color:#FF4D6D;
            padding:12px 16px;
            border-radius:12px;
            font-size:13px;
            margin-bottom:16px;
            display:none;
            text-align:center;
        }
        .error-msg.show{display:block}
        .success-msg{
            background:rgba(0,200,150,0.1);
            color:#00C896;
            padding:12px 16px;
            border-radius:12px;
            font-size:13px;
            margin-bottom:16px;
            display:none;
            text-align:center;
        }
        .success-msg.show{display:block}
        .register-link{text-align:center;margin-top:20px;font-size:14px;color:#6B7280}
        body.dark-mode .register-link{color:#9AA3B2}
        .register-link a{color:#6C4DF6;font-weight:600;text-decoration:none}
        .demo-section{margin-top:24px;padding:16px;background:rgba(108,77,246,0.04);border-radius:14px;border:1px solid rgba(108,77,246,0.1)}
        body.dark-mode .demo-section{background:rgba(139,124,255,0.05);border-color:rgba(139,124,255,0.1)}
        .demo-section summary{font-weight:600;font-size:13px;cursor:pointer;color:#6C4DF6;margin-bottom:10px}
        .demo-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:12px;border-bottom:1px solid rgba(0,0,0,0.04)}
        body.dark-mode .demo-row{border-bottom-color:rgba(255,255,255,0.04)}
        .demo-row:last-child{border-bottom:none}
        .demo-role{font-weight:600;color:#6C4DF6;min-width:70px;text-transform:capitalize}
        .demo-email{flex:1;margin:0 8px;color:#6B7280;font-size:11px}
        body.dark-mode .demo-email{color:#9AA3B2}
        .demo-fill-btn{padding:4px 10px;background:#6C4DF6;color:#fff;border:none;border-radius:8px;font-size:10px;cursor:pointer;font-weight:600}
        .bg-glow{position:fixed;width:500px;height:500px;border-radius:50%;filter:blur(120px);opacity:0.2;pointer-events:none;z-index:0}
        .bg-glow.g1{background:rgba(108,77,246,0.4);top:-20%;left:-10%}
        .bg-glow.g2{background:rgba(60,130,246,0.35);bottom:-15%;right:-10%}
    </style>
</head>
<body>
    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="icon">R</div>
                <h1>RASAAI</h1>
            </div>
            <p class="login-subtitle">Sign in to your account</p>
            
            <div class="error-msg" id="error-msg"></div>
            <div class="success-msg" id="success-msg"></div>
            
            <form onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <div class="remember-row">
                    <label><input type="checkbox" id="remember"> Remember me</label>
                    <a href="forgot-password.html">Forgot password?</a>
                </div>
                <button type="submit" class="btn-login" id="login-btn">🔐 Sign In</button>
            </form>
            
            <p class="register-link">Don't have an account? <a href="register.html">Create one</a></p>
            
            <details class="demo-section">
                <summary>🔑 Demo Login Credentials (Click to expand)</summary>
                <div style="margin-top:8px">
                    <div class="demo-row">
                        <span class="demo-role">👑 Admin</span>
                        <span class="demo-email">admin@rasaai.com</span>
                        <button class="demo-fill-btn" onclick="fillDemo('admin@rasaai.com','admin123')">Fill</button>
                    </div>
                    <div class="demo-row">
                        <span class="demo-role">👤 Client</span>
                        <span class="demo-email">client@rasaai.com</span>
                        <button class="demo-fill-btn" onclick="fillDemo('client@rasaai.com','client123')">Fill</button>
                    </div>
                    <div class="demo-row">
                        <span class="demo-role">🛺 Driver</span>
                        <span class="demo-email">driver@rasaai.com</span>
                        <button class="demo-fill-btn" onclick="fillDemo('driver@rasaai.com','driver123')">Fill</button>
                    </div>
                    <div class="demo-row">
                        <span class="demo-role">🔗 Affiliate</span>
                        <span class="demo-email">affiliate@rasaai.com</span>
                        <button class="demo-fill-btn" onclick="fillDemo('affiliate@rasaai.com','affiliate123')">Fill</button>
                    </div>
                    <div class="demo-row">
                        <span class="demo-role">📊 Sales</span>
                        <span class="demo-email">sales@rasaai.com</span>
                        <button class="demo-fill-btn" onclick="fillDemo('sales@rasaai.com','sales123')">Fill</button>
                    </div>
                </div>
            </details>
        </div>
    </div>

    <script>
        // =====================================================
        // DEMO USERS DATABASE (Hardcoded - Always Available)
        // =====================================================
        const DEMO_USERS = [
            { id: 'ADM001', name: 'Admin User', email: 'admin@rasaai.com', password: 'admin123', role: 'admin', phone: '9876543210', active: true, company: '', gst: '', permissions: ['*'], avatar: 'A' },
            { id: 'CLI001', name: 'Rahul Sharma', email: 'client@rasaai.com', password: 'client123', role: 'client', phone: '9876543211', active: true, company: 'Mumbra Pizza House', gst: '27AAAAA0000A1Z5', permissions: ['campaigns','invoices','analytics','affiliate'], avatar: 'RS' },
            { id: 'DRV001', name: 'Salman Khan', email: 'driver@rasaai.com', password: 'driver123', role: 'driver', phone: '9876543212', active: true, zone: 'mumbra-station', rickshawId: 'RICK001', permissions: ['tasks','attendance','upload'], avatar: 'SK' },
            { id: 'AFF001', name: 'Priya Patel', email: 'affiliate@rasaai.com', password: 'affiliate123', role: 'affiliate', phone: '9876543213', active: true, referralCode: 'REF001', permissions: ['referrals','commissions','wallet'], avatar: 'PP' },
            { id: 'SAL001', name: 'Amit Verma', email: 'sales@rasaai.com', password: 'sales123', role: 'sales', phone: '9876543214', active: true, target: 500000, permissions: ['leads','pipeline','tasks','proposals'], avatar: 'AV' }
        ];

        // =====================================================
        // SIMPLE STORAGE HELPERS
        // =====================================================
        function saveData(key, value) {
            try {
                localStorage.setItem('rasaai_' + key, JSON.stringify(value));
            } catch(e) {
                console.warn('Storage full:', e);
            }
        }

        function getData(key, defaultValue) {
            try {
                const raw = localStorage.getItem('rasaai_' + key);
                return raw ? JSON.parse(raw) : defaultValue;
            } catch(e) {
                return defaultValue;
            }
        }

        // =====================================================
        // SEED DEMO USERS INTO LOCAL STORAGE
        // =====================================================
        function seedUsers() {
            const existing = getData('users', []);
            if (existing.length === 0) {
                saveData('users', DEMO_USERS);
                console.log('✅ Demo users seeded');
            }
        }
        seedUsers();

        // =====================================================
        // LOGIN FUNCTION
        // =====================================================
        function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const errorEl = document.getElementById('error-msg');
            const successEl = document.getElementById('success-msg');
            const btn = document.getElementById('login-btn');
            
            // Hide messages
            errorEl.classList.remove('show');
            successEl.classList.remove('show');
            
            // Validation
            if (!email) {
                errorEl.textContent = '❌ Please enter your email';
                errorEl.classList.add('show');
                return false;
            }
            if (!password) {
                errorEl.textContent = '❌ Please enter your password';
                errorEl.classList.add('show');
                return false;
            }
            
            // Show loading
            btn.disabled = true;
            btn.textContent = '⏳ Signing in...';
            
            // Simulate network delay
            setTimeout(() => {
                const users = getData('users', DEMO_USERS);
                const user = users.find(u => u.email === email && u.password === password);
                
                if (!user) {
                    errorEl.textContent = '❌ Invalid email or password. Try demo: admin@rasaai.com / admin123';
                    errorEl.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = '🔐 Sign In';
                    return;
                }
                
                if (!user.active) {
                    errorEl.textContent = '❌ Account deactivated. Contact admin.';
                    errorEl.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = '🔐 Sign In';
                    return;
                }
                
                // Login successful!
                const sessionUser = { ...user };
                delete sessionUser.password;
                
                // Save session
                saveData('currentUser', sessionUser);
                
                // Remember email
                if (remember) {
                    saveData('rememberedEmail', email);
                }
                
                successEl.textContent = '✅ Login successful! Redirecting...';
                successEl.classList.add('show');
                btn.textContent = '✅ Success!';
                
                // Redirect based on role
                setTimeout(() => {
                    switch(user.role) {
                        case 'admin':
                            window.location.href = 'admin.html';
                            break;
                        case 'client':
                            window.location.href = 'client.html';
                            break;
                        case 'driver':
                            window.location.href = 'driver.html';
                            break;
                        case 'affiliate':
                            window.location.href = 'affiliate.html';
                            break;
                        case 'sales':
                            window.location.href = 'crm.html';
                            break;
                        default:
                            window.location.href = 'dashboard.html';
                    }
                }, 800);
                
            }, 500);
            
            return false;
        }

        // =====================================================
        // FILL DEMO CREDENTIALS
        // =====================================================
        function fillDemo(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
            document.getElementById('email').focus();
        }

        // =====================================================
        // CHECK IF ALREADY LOGGED IN
        // =====================================================
        (function checkAuth() {
            const user = getData('currentUser', null);
            if (user) {
                const redirect = new URLSearchParams(window.location.search).get('redirect');
                if (redirect) {
                    window.location.href = redirect;
                } else {
                    switch(user.role) {
                        case 'admin': window.location.href = 'admin.html'; break;
                        case 'client': window.location.href = 'client.html'; break;
                        case 'driver': window.location.href = 'driver.html'; break;
                        case 'affiliate': window.location.href = 'affiliate.html'; break;
                        case 'sales': window.location.href = 'crm.html'; break;
                    }
                }
            }
            
            // Fill remembered email
            const remembered = getData('rememberedEmail', '');
            if (remembered && document.getElementById('email')) {
                document.getElementById('email').value = remembered;
            }
        })();

        console.log('✅ RASAAI Login Page Ready');
        console.log('📧 Demo: admin@rasaai.com / admin123');
    </script>
</body>
</html>
