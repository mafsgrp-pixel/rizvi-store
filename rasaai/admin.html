<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
    <meta name="theme-color" content="#0F1117">
    <meta name="color-scheme" content="dark">
    
    <title>Admin ERP - RASAAI Outdoor Advertising Network</title>
    <meta name="description" content="RASAAI Admin ERP - Manage users, campaigns, drivers, zones, pricing, invoices, and analytics.">
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="canonical" href="https://rizvi.store/rasaai/admin.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C4DF6'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-weight='bold'>R</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        :root {
            --sidebar-w: 260px;
        }
        .admin-body {
            display: flex;
            min-height: 100vh;
            background: var(--dark-bg);
            color: var(--dark-text);
        }
        .admin-sidebar {
            width: var(--sidebar-w);
            background: var(--dark-glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--dark-glass-border);
            padding: 24px 16px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 200;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.3s;
        }
        .admin-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            margin-bottom: 32px;
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--dark-primary), #5D8EFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }
        .admin-logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--dark-primary), #5D8EFF);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFF;
            font-size: 18px;
            font-weight: 900;
            -webkit-text-fill-color: #FFF;
            flex-shrink: 0;
        }
        .admin-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .admin-nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
            color: var(--dark-muted);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .admin-nav-link:hover {
            background: rgba(139,124,255,0.1);
            color: var(--dark-primary);
        }
        .admin-nav-link.active {
            background: rgba(139,124,255,0.15);
            color: var(--dark-primary);
            font-weight: 600;
        }
        .admin-nav-icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }
        .admin-nav-badge {
            margin-left: auto;
            background: var(--dark-primary);
            color: #FFF;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .admin-sidebar-footer {
            border-top: 1px solid var(--dark-border);
            padding-top: 16px;
            margin-top: auto;
        }
        
        .admin-main {
            margin-left: var(--sidebar-w);
            flex: 1;
            padding: 32px;
            min-height: 100vh;
        }
        .admin-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .admin-topbar h1 {
            font-size: 28px;
            font-weight: 800;
        }
        .admin-topbar-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .admin-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--dark-primary), #5D8EFF);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
        }
        
        .admin-section {
            display: none;
        }
        .admin-section.active {
            display: block;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--dark-card);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--dark-border);
        }
        .stat-card-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .stat-card-value {
            font-size: 32px;
            font-weight: 800;
        }
        .stat-card-label {
            font-size: 14px;
            color: var(--dark-muted);
            margin-top: 4px;
        }
        
        .data-card {
            background: var(--dark-card);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--dark-border);
            margin-bottom: 24px;
        }
        .data-card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th {
            text-align: left;
            padding: 14px 16px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--dark-muted);
            border-bottom: 1px solid var(--dark-border);
            white-space: nowrap;
        }
        .admin-table td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--dark-border);
        }
        .admin-table tr:hover td {
            background: rgba(139,124,255,0.04);
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
        }
        .badge-success { background: rgba(0,200,150,0.15); color: #00C896; }
        .badge-warning { background: rgba(255,181,71,0.15); color: #FFB547; }
        .badge-danger { background: rgba(255,77,109,0.15); color: #FF4D6D; }
        .badge-info { background: rgba(93,142,255,0.15); color: #5D8EFF; }
        .badge-purple { background: rgba(139,124,255,0.15); color: #8B7CFF; }
        
        .btn-xs {
            padding: 6px 12px;
            font-size: 12px;
            min-height: 30px;
            border-radius: 8px;
        }
        .btn-icon-xs {
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-box {
            background: var(--dark-card);
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--dark-border);
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-box h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        .mobile-toggle {
            display: none;
            width: 44px; height: 44px;
            border-radius: 12px;
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            color: var(--dark-text);
            font-size: 20px;
            cursor: pointer;
        }
        
        @media (max-width: 992px) {
            .admin-sidebar {
                transform: translateX(-100%);
            }
            .admin-sidebar.open {
                transform: translateX(0);
            }
            .admin-main {
                margin-left: 0 !important;
            }
            .mobile-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }
        @media (max-width: 768px) {
            .admin-main {
                padding: 20px;
            }
            .stat-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .stat-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="dark-mode">
    <div class="admin-body">
        <!-- Sidebar Overlay -->
        <div id="sidebar-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:199" onclick="AdminPage.toggleSidebar()"></div>
        
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="admin-logo" onclick="window.location.href='index.html'">
                <div class="admin-logo-icon">R</div><span>RASAAI ERP</span>
            </div>
            <nav class="admin-nav" id="admin-nav">
                <a class="admin-nav-link active" data-section="dashboard" onclick="AdminPage.loadSection('dashboard')"><span class="admin-nav-icon">📊</span>Dashboard</a>
                <a class="admin-nav-link" data-section="campaigns" onclick="AdminPage.loadSection('campaigns')"><span class="admin-nav-icon">📢</span>Campaigns<span class="admin-nav-badge" id="campaign-count">0</span></a>
                <a class="admin-nav-link" data-section="users" onclick="AdminPage.loadSection('users')"><span class="admin-nav-icon">👥</span>Users</a>
                <a class="admin-nav-link" data-section="drivers" onclick="AdminPage.loadSection('drivers')"><span class="admin-nav-icon">🛺</span>Drivers</a>
                <a class="admin-nav-link" data-section="zones" onclick="AdminPage.loadSection('zones')"><span class="admin-nav-icon">📍</span>Zones</a>
                <a class="admin-nav-link" data-section="pricing" onclick="AdminPage.loadSection('pricing')"><span class="admin-nav-icon">💰</span>Pricing</a>
                <a class="admin-nav-link" data-section="invoices" onclick="AdminPage.loadSection('invoices')"><span class="admin-nav-icon">🧾</span>Invoices</a>
                <a class="admin-nav-link" data-section="payments" onclick="AdminPage.loadSection('payments')"><span class="admin-nav-icon">💳</span>Payments</a>
                <a class="admin-nav-link" data-section="affiliates" onclick="AdminPage.loadSection('affiliates')"><span class="admin-nav-icon">🔗</span>Affiliates</a>
                <a class="admin-nav-link" data-section="crm" onclick="AdminPage.loadSection('crm')"><span class="admin-nav-icon">🎯</span>CRM</a>
                <a class="admin-nav-link" data-section="analytics" onclick="AdminPage.loadSection('analytics')"><span class="admin-nav-icon">📈</span>Analytics</a>
                <a class="admin-nav-link" data-section="audit" onclick="AdminPage.loadSection('audit')"><span class="admin-nav-icon">📝</span>Audit Logs</a>
            </nav>
            <div class="admin-sidebar-footer">
                <a class="admin-nav-link" href="index.html"><span class="admin-nav-icon">🏠</span>Back to Site</a>
                <a class="admin-nav-link" onclick="Auth.logout()" style="cursor:pointer"><span class="admin-nav-icon">🚪</span>Logout</a>
            </div>
        </aside>
        
        <!-- Main -->
        <main class="admin-main">
            <div class="admin-topbar">
                <div style="display:flex;align-items:center;gap:12px">
                    <button class="mobile-toggle" onclick="AdminPage.toggleSidebar()">☰</button>
                    <h1 id="admin-title">Admin Dashboard</h1>
                </div>
                <div class="admin-topbar-actions">
                    <span style="color:var(--dark-muted);font-size:14px" id="admin-user-name">Admin</span>
                    <div class="admin-avatar" id="admin-avatar" title="Admin">A</div>
                </div>
            </div>
            
            <div id="admin-content">
                <!-- Dashboard -->
                <div class="admin-section active" id="sec-dashboard"></div>
                <!-- Campaigns -->
                <div class="admin-section" id="sec-campaigns"></div>
                <!-- Users -->
                <div class="admin-section" id="sec-users"></div>
                <!-- Drivers -->
                <div class="admin-section" id="sec-drivers"></div>
                <!-- Zones -->
                <div class="admin-section" id="sec-zones"></div>
                <!-- Pricing -->
                <div class="admin-section" id="sec-pricing"></div>
                <!-- Invoices -->
                <div class="admin-section" id="sec-invoices"></div>
                <!-- Payments -->
                <div class="admin-section" id="sec-payments"></div>
                <!-- Affiliates -->
                <div class="admin-section" id="sec-affiliates"></div>
                <!-- CRM -->
                <div class="admin-section" id="sec-crm"></div>
                <!-- Analytics -->
                <div class="admin-section" id="sec-analytics"></div>
                <!-- Audit -->
                <div class="admin-section" id="sec-audit"></div>
            </div>
        </main>
    </div>
    
    <div id="notification-container" class="notification-container" aria-live="polite" role="status"></div>
    
    <script src="app.js"></script>
    <script>
        const AdminPage = {
            user: null,
            currentSection: 'dashboard',
            
            init() {
                this.user = Auth.getCurrentUser();
                if (!this.user || this.user.role !== 'admin') {
                    Notify.error('Access denied. Admin only.');
                    window.location.href = 'login.html';
                    return;
                }
                document.getElementById('admin-user-name').textContent = this.user.name;
                document.getElementById('admin-avatar').textContent = this.user.name.charAt(0).toUpperCase();
                this.loadSection('dashboard');
                this.updateBadges();
            },
            
            toggleSidebar() {
                const sidebar = document.getElementById('admin-sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                sidebar.classList.toggle('open');
                overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
            },
            
            loadSection(section) {
                this.currentSection = section;
                document.querySelectorAll('.admin-nav-link').forEach(l => l.classList.remove('active'));
                document.querySelector(`[data-section="${section}"]`)?.classList.add('active');
                document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
                const sec = document.getElementById('sec-' + section);
                if (sec) sec.classList.add('active');
                
                const titles = {dashboard:'Admin Dashboard',campaigns:'Campaigns',users:'Users',drivers:'Drivers',zones:'Zones',pricing:'Pricing',invoices:'Invoices',payments:'Payments',affiliates:'Affiliates',crm:'CRM Pipeline',analytics:'Analytics','audit':'Audit Logs'};
                document.getElementById('admin-title').textContent = titles[section] || 'Admin';
                
                switch(section) {
                    case 'dashboard': this.renderDashboard(); break;
                    case 'campaigns': this.renderCampaigns(); break;
                    case 'users': this.renderUsers(); break;
                    case 'drivers': this.renderDrivers(); break;
                    case 'zones': this.renderZones(); break;
                    case 'pricing': this.renderPricing(); break;
                    case 'invoices': this.renderInvoices(); break;
                    case 'payments': this.renderPayments(); break;
                    case 'affiliates': this.renderAffiliates(); break;
                    case 'crm': this.renderCRM(); break;
                    case 'analytics': this.renderAnalytics(); break;
                    case 'audit': this.renderAudit(); break;
                }
            },
            
            updateBadges() {
                const campaigns = CampaignManager.getCampaigns();
                document.getElementById('campaign-count').textContent = campaigns.length;
            },
            
            // ==================== RENDERERS ====================
            
            renderDashboard() {
                const stats = CampaignManager.getStats();
                const invStats = Inventory.getStats();
                const users = Auth.getAllUsers();
                const invoices = InvoiceManager.getInvoices();
                const revenue = invoices.reduce((s,i) => s + (i.total||0), 0);
                const campaigns = CampaignManager.getCampaigns();
                
                document.getElementById('sec-dashboard').innerHTML = `
                    <div class="stat-grid">
                        <div class="stat-card"><div class="stat-card-icon">📢</div><div class="stat-card-value">${stats.total}</div><div class="stat-card-label">Total Campaigns</div></div>
                        <div class="stat-card"><div class="stat-card-icon">💰</div><div class="stat-card-value">₹${revenue.toLocaleString()}</div><div class="stat-card-label">Total Revenue</div></div>
                        <div class="stat-card"><div class="stat-card-icon">👥</div><div class="stat-card-value">${users.length}</div><div class="stat-card-label">Total Users</div></div>
                        <div class="stat-card"><div class="stat-card-icon">🛺</div><div class="stat-card-value">${invStats.available}</div><div class="stat-card-label">Available Rickshaws</div></div>
                    </div>
                    <div class="data-card">
                        <h3>📋 Recent Campaigns</h3>
                        <div style="overflow-x:auto"><table class="admin-table"><thead><tr><th>Campaign</th><th>Client</th><th>Zone</th><th>Type</th><th>Cost</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody>${campaigns.slice(-10).reverse().map(c=>`<tr><td><strong>${c.name}</strong></td><td>${c.userName||'N/A'}</td><td>${c.zoneName}</td><td>${c.type}</td><td>₹${(c.cost||0).toLocaleString()}</td><td><span class="badge badge-${c.status==='active'?'success':c.status==='completed'?'info':'warning'}">${c.status}</span></td><td><button class="btn btn-danger btn-xs" onclick="AdminPage.deleteCampaign('${c.id}')">🗑️</button></td></tr>`).join('')||'<tr><td colspan="7" class="text-center">No campaigns</td></tr>'}</tbody></table></div>
                    </div>`;
            },
            
            renderCampaigns() {
                const campaigns = CampaignManager.getCampaigns();
                document.getElementById('sec-campaigns').innerHTML = `
                    <div class="data-card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px"><h3>📢 All Campaigns (${campaigns.length})</h3><input type="search" placeholder="🔍 Search..." oninput="AdminPage.filterTable(this.value,'camp-table')" style="max-width:300px;background:var(--dark-input-bg);border:1px solid var(--dark-border);color:var(--dark-text);padding:10px 16px;border-radius:20px"></div>
                    <div style="overflow-x:auto"><table class="admin-table" id="camp-table"><thead><tr><th>Campaign</th><th>Client</th><th>Zone</th><th>Type</th><th>Qty</th><th>Days</th><th>Cost</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>${campaigns.reverse().map(c=>`<tr><td><strong>${c.name}</strong>${c.hashtag?`<br><small>#${c.hashtag}</small>`:''}</td><td>${c.userName||'N/A'}</td><td>${c.zoneName}</td><td>${c.type}</td><td>${c.quantity}</td><td>${c.days}</td><td>₹${(c.cost||0).toLocaleString()}</td><td><span class="badge badge-${c.status==='active'?'success':c.status==='completed'?'info':'warning'}">${c.status}</span></td><td>${c.status==='active'?`<button class="btn btn-warning btn-xs" onclick="AdminPage.endCampaign('${c.id}')">End</button>`:''} <button class="btn btn-danger btn-xs" onclick="AdminPage.deleteCampaign('${c.id}')">🗑️</button></td></tr>`).join('')||'<tr><td colspan="9" class="text-center">No campaigns</td></tr>'}</tbody></table></div></div>`;
            },
            
            renderUsers() {
                const users = Auth.getAllUsers();
                document.getElementById('sec-users').innerHTML = `
                    <div class="data-card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px"><h3>👥 Users (${users.length})</h3><button class="btn btn-primary btn-sm" onclick="AdminPage.addUser()">+ Add User</button></div>
                    <div style="overflow-x:auto"><table class="admin-table"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Phone</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
                    <tbody>${users.map(u=>`<tr><td><strong>${u.name}</strong></td><td>${u.email}</td><td><span class="badge badge-purple">${u.role}</span></td><td>${u.phone||'N/A'}</td><td><span class="badge badge-${u.active?'success':'danger'}">${u.active?'Active':'Inactive'}</span></td><td>${new Date(u.createdAt).toLocaleDateString()}</td><td><button class="btn btn-outline btn-xs" onclick="AdminPage.toggleUser('${u.id}')">${u.active?'Deactivate':'Activate'}</button></td></tr>`).join('')}</tbody></table></div></div>`;
            },
            
            renderDrivers() {
                const drivers = Auth.getAllUsers().filter(u=>u.role==='driver');
                document.getElementById('sec-drivers').innerHTML = `
                    <div class="data-card"><h3>🛺 Drivers (${drivers.length})</h3>
                    <div style="overflow-x:auto"><table class="admin-table"><thead><tr><th>Name</th><th>Phone</th><th>Rickshaw ID</th><th>Zone</th><th>Status</th><th>Tasks</th></tr></thead>
                    <tbody>${drivers.map(d=>`<tr><td><strong>${d.name}</strong></td><td>${d.phone||'N/A'}</td><td>${d.rickshawId||'N/A'}</td><td>${d.zone||'N/A'}</td><td><span class="badge badge-${d.active?'success':'danger'}">${d.active?'Active':'Inactive'}</span></td><td>${CRMManager.getTasks(d.id).length} tasks</td></tr>`).join('')||'<tr><td colspan="6" class="text-center">No drivers</td></tr>'}</tbody></table></div></div>`;
            },
            
            renderZones() {
                const zones = CampaignCalculator.getZones();
                document.getElementById('sec-zones').innerHTML = `
                    <div class="stat-grid">${zones.map(z=>{const a=Inventory.getAvailable(z.id);return`<div class="stat-card"><div class="stat-card-icon">📍</div><div class="stat-card-value">${z.name}</div><div class="stat-card-label">Pop: ${z.population.toLocaleString()} | Traffic: ${z.traffic.toLocaleString()}/day</div><div style="margin-top:8px;font-size:14px">🛺 ${a}/50 available | Peak: ${z.peakHours}</div></div>`}).join('')}</div>`;
            },
            
            renderPricing() {
                const p = PricingEngine.currentPrices;
                document.getElementById('sec-pricing').innerHTML = `
                    <div class="data-card"><h3>💰 Current Pricing</h3>
                    <div class="stat-grid"><div class="stat-card"><div class="stat-card-icon">📺</div><div class="stat-card-value">₹${p.led.toLocaleString()}</div><div class="stat-card-label">LED /day/rickshaw</div></div>
                    <div class="stat-card"><div class="stat-card-icon">🔊</div><div class="stat-card-value">₹${p.audio.toLocaleString()}</div><div class="stat-card-label">Audio /day/rickshaw</div></div></div>
                    <p style="color:var(--dark-muted)">Range: LED ₹1,238-₹1,647 | Audio ₹318-₹639 | Updates every 15 min | Next update in <span id="admin-timer">--</span></p>
                    <button class="btn btn-primary" onclick="PricingEngine.generatePrices();AdminPage.renderPricing();Notify.success('Prices refreshed!')">🔄 Refresh Prices Now</button></div>`;
                setInterval(()=>{const el=document.getElementById('admin-timer');if(el){const m=Math.floor(PricingEngine.secondsRemaining/60);const s=PricingEngine.secondsRemaining%60;el.textContent=`${m}:${String(s).padStart(2,'0')}`;}},1000);
            },
            
            renderInvoices() {
                const invoices = InvoiceManager.getInvoices();
                document.getElementById('sec-invoices').innerHTML = `
                    <div class="data-card"><h3>🧾 Invoices (${invoices.length})</h3>
                    <div style="overflow-x:auto"><table class="admin-table"><thead><tr><th>Invoice #</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                    <tbody>${invoices.reverse().slice(0,50).map(i=>`<tr><td>${i.invoiceNumber}</td><td>${i.customerName}</td><td><strong>₹${i.total.toLocaleString()}</strong></td><td><span class="badge badge-${i.status==='paid'?'success':i.status==='pending'?'warning':'danger'}">${i.status}</span></td><td>${new Date(i.createdAt).toLocaleDateString()}</td><td><button class="btn btn-outline btn-xs" onclick="InvoiceManager.downloadInvoice('${i.id}')">📥</button></td></tr>`).join('')||'<tr><td colspan="6" class="text-center">No invoices</td></tr>'}</tbody></table></div></div>`;
            },
            
            renderPayments() {
                const payments = PaymentManager.getPayments();
                document.getElementById('sec-payments').innerHTML = `
                    <div class="data-card"><h3>💳 Payments (${payments.length})</h3>
                    <div style="overflow-x:auto"><table class="admin-table"><thead><tr><th>Payment ID</th><th>Invoice</th><th>Amount</th><th>Method</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>${payments.slice(0,50).map(p=>`<tr><td>${p.id}</td><td>${p.invoiceId}</td><td>₹${p.amount.toLocaleString()}</td><td>${p.method}</td><td><span class="badge badge-${p.status==='verified'?'success':'warning'}">${p.status}</span></td><td>${p.status==='pending'?`<button class="btn btn-success btn-xs" onclick="PaymentManager.approvePayment('${p.id}');AdminPage.renderPayments();Notify.success('Approved!')">Approve</button>`:''}</td></tr>`).join('')||'<tr><td colspan="6" class="text-center">No payments</td></tr>'}</tbody></table></div></div>`;
            },
            
            renderAffiliates() {
                const leaderboard = AffiliateManager.getLeaderboard(20);
                const withdrawals = Storage.get('withdrawals', []);
                document.getElementById('sec-affiliates').innerHTML = `
                    <div class="data-card"><h3>🔗 Affiliate Leaderboard</h3>
                    ${leaderboard.map((l,i)=>`<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--dark-border)"><span style="font-weight:700;min-width:30px">#${i+1}</span><span style="flex:1">${l.name}</span><strong>₹${l.total.toLocaleString()}</strong></div>`).join('')||'<p>No affiliates yet</p>'}</div>
                    <div class="data-card"><h3>💸 Pending Withdrawals</h3>
                    ${withdrawals.filter(w=>w.status==='pending').map(w=>`<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--dark-border)"><span>${Auth.getUserById(w.userId)?.name||'Unknown'}</span><span style="flex:1">₹${w.amount.toLocaleString()}</span><button class="btn btn-success btn-xs" onclick="AffiliateManager.approveWithdrawal('${w.id}');AdminPage.renderAffiliates();Notify.success('Approved!')">Approve</button></div>`).join('')||'<p>No pending withdrawals</p>'}</div>`;
            },
            
            renderCRM() {
                const stats = CRMManager.getPipelineStats();
                document.getElementById('sec-crm').innerHTML = `
                    <div class="stat-grid"><div class="stat-card"><div class="stat-card-value">${stats.total}</div><div class="stat-card-label">Total Leads</div></div><div class="stat-card"><div class="stat-card-value">${stats.Won?.length||0}</div><div class="stat-card-label">Won</div></div><div class="stat-card"><div class="stat-card-value">${CRMManager.getConversionRate()}%</div><div class="stat-card-label">Conversion Rate</div></div><div class="stat-card"><div class="stat-card-value">₹${(stats.totalValue||0).toLocaleString()}</div><div class="stat-card-label">Pipeline Value</div></div></div>
                    <div class="data-card"><h3>🎯 Pipeline</h3><div style="display:flex;gap:16px;overflow-x:auto;padding-bottom:16px">${CRMManager.STATUSES.map(s=>`<div style="min-width:220px;background:var(--dark-bg);border-radius:16px;padding:16px;border:1px solid var(--dark-border)"><strong>${s}</strong><span style="float:right;background:rgba(139,124,255,0.2);padding:2px 10px;border-radius:10px;font-size:12px">${(stats[s]||[]).length}</span>${(stats[s]||[]).slice(0,8).map(l=>`<div style="background:var(--dark-card);border-radius:8px;padding:10px;margin-top:8px;cursor:pointer"><strong>${l.name}</strong><p style="font-size:11px;color:var(--dark-muted)">${l.company||'N/A'}</p></div>`).join('')}</div>`).join('')}</div></div>`;
            },
            
            renderAnalytics() {
                const totals = Analytics.getTotals();
                document.getElementById('sec-analytics').innerHTML = `
                    <div class="stat-grid"><div class="stat-card"><div class="stat-card-value">${totals.totalZones}</div><div class="stat-card-label">Zones</div></div><div class="stat-card"><div class="stat-card-value">${totals.totalPopulation.toLocaleString()}</div><div class="stat-card-label">Total Population</div></div><div class="stat-card"><div class="stat-card-value">${totals.totalTraffic.toLocaleString()}</div><div class="stat-card-label">Daily Traffic</div></div><div class="stat-card"><div class="stat-card-value">${totals.totalCampaigns}</div><div class="stat-card-label">Campaigns</div></div></div>
                    <div class="data-card"><h3>📈 Zone Performance</h3><canvas id="admin-chart" height="300"></canvas></div>
                    <button class="btn btn-outline" onclick="Analytics.exportCSV()">📥 Export CSV</button>`;
                setTimeout(()=>{const c=document.getElementById('admin-chart');if(c&&window.Dashboard){const zones=CampaignCalculator.getZones().slice(0,8);Dashboard.drawBarChart(c.getContext('2d'),c.parentElement.offsetWidth-48,300,zones.map(z=>z.name.split(' ')[0]),zones.map(()=>Math.floor(Math.random()*20)+3));}},300);
            },
            
            renderAudit() {
                const logs = App.getAuditLogs({limit:100});
                document.getElementById('sec-audit').innerHTML = `
                    <div class="data-card"><h3>📝 Audit Logs (Last 100)</h3>
                    <div style="overflow-x:auto"><table class="admin-table"><thead><tr><th>Time</th><th>User</th><th>Role</th><th>Action</th><th>Detail</th></tr></thead>
                    <tbody>${logs.map(l=>`<tr><td style="font-size:12px">${new Date(l.timestamp).toLocaleString()}</td><td>${l.userName}</td><td>${l.userRole}</td><td>${l.action}</td><td>${l.detail||''}</td></tr>`).join('')||'<tr><td colspan="5" class="text-center">No logs</td></tr>'}</tbody></table></div></div>`;
            },
            
            // ==================== ACTIONS ====================
            filterTable(query, tableId) {
                const q = query.toLowerCase();
                document.querySelectorAll(`#${tableId} tbody tr`).forEach(r => r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none');
            },
            deleteCampaign(id) {
                if (confirm('Delete this campaign permanently?')) {
                    CampaignManager.deleteCampaign(id);
                    Notify.success('Deleted');
                    this.updateBadges();
                    this.loadSection(this.currentSection);
                }
            },
            endCampaign(id) {
                CampaignManager.updateCampaign(id, { status: 'completed' });
                Notify.success('Campaign ended');
                this.loadSection(this.currentSection);
            },
            toggleUser(id) {
                Auth.toggleUserStatus(id);
                Notify.success('User status toggled');
                this.loadSection('users');
            },
            addUser() {
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = `<div class="modal-box"><h3>Add User</h3><form onsubmit="return false">
                    <div class="form-group"><label>Name</label><input type="text" id="add-name" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="add-email" required></div>
                    <div class="form-group"><label>Phone</label><input type="tel" id="add-phone"></div>
                    <div class="form-group"><label>Password</label><input type="text" id="add-password" value="password123" required></div>
                    <div class="form-group"><label>Role</label><select id="add-role"><option value="client">Client</option><option value="driver">Driver</option><option value="affiliate">Affiliate</option><option value="sales">Sales</option><option value="admin">Admin</option></select></div>
                    <button class="btn btn-primary btn-block mt-4" onclick="AdminPage.submitAddUser(this.closest('.modal-overlay'))">Add User</button>
                    <button class="btn btn-outline btn-block mt-2" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                </form></div>`;
                document.body.appendChild(modal);
                modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
            },
            submitAddUser(modal) {
                const result = Auth.register({
                    name: document.getElementById('add-name').value,
                    email: document.getElementById('add-email').value,
                    phone: document.getElementById('add-phone').value,
                    password: document.getElementById('add-password').value,
                    role: document.getElementById('add-role').value
                });
                if (result.success) {
                    Notify.success('User added!');
                    modal.remove();
                    this.loadSection('users');
                } else {
                    Notify.error(result.message);
                }
            }
        };
        
        document.addEventListener('DOMContentLoaded', () => AdminPage.init());
        if (document.readyState !== 'loading') AdminPage.init();
    </script>
</body>
</html>
