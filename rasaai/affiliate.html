<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
    <meta name="theme-color" content="#6C4DF6">
    <title>Affiliate Portal - RASAAI</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://rizvi.store/rasaai/affiliate.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C4DF6'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-weight='bold'>R</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .aff-body{display:flex;min-height:100vh;background:var(--bg)}
        body.dark-mode .aff-body{background:var(--dark-bg)}
        .aff-sidebar{width:260px;background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1px solid var(--glass-border);padding:24px 16px;position:fixed;top:0;left:0;height:100vh;z-index:200;display:flex;flex-direction:column;overflow-y:auto;transition:transform 0.3s}
        body.dark-mode .aff-sidebar{background:var(--dark-glass-bg);border-right-color:var(--dark-glass-border)}
        .aff-logo{display:flex;align-items:center;gap:12px;padding:8px 12px;margin-bottom:32px;font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
        .aff-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--accent-cyan));border-radius:12px;display:flex;align-items:center;justify-content:center;color:#FFF;font-size:18px;font-weight:900;-webkit-text-fill-color:#FFF;flex-shrink:0}
        .aff-nav{flex:1;display:flex;flex-direction:column;gap:4px}
        .aff-nav-link{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;font-weight:500;font-size:14px;color:var(--text-secondary);cursor:pointer;transition:all 0.2s}
        .aff-nav-link:hover{background:rgba(108,77,246,0.08);color:var(--primary)}
        .aff-nav-link.active{background:rgba(108,77,246,0.12);color:var(--primary);font-weight:600}
        body.dark-mode .aff-nav-link{color:var(--dark-muted)}
        body.dark-mode .aff-nav-link:hover{background:rgba(139,124,255,0.1);color:var(--dark-primary)}
        body.dark-mode .aff-nav-link.active{background:rgba(139,124,255,0.15);color:var(--dark-primary)}
        .aff-nav-icon{font-size:20px;width:24px;text-align:center;flex-shrink:0}
        .aff-sidebar-footer{border-top:1px solid var(--border);padding-top:16px;margin-top:auto}
        body.dark-mode .aff-sidebar-footer{border-top-color:var(--dark-border)}
        .aff-main{margin-left:260px;flex:1;padding:32px;min-height:100vh;transition:margin-left 0.3s}
        .aff-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:16px}
        .aff-topbar h1{font-size:28px;font-weight:800}
        .aff-section{display:none}
        .aff-section.active{display:block}
        .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:24px}
        .stat-card{background:var(--card);border-radius:20px;padding:24px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
        body.dark-mode .stat-card{background:var(--dark-card);border-color:var(--dark-border)}
        .stat-card-icon{font-size:32px;margin-bottom:8px}
        .stat-card-value{font-size:28px;font-weight:800}
        .stat-card-label{font-size:14px;color:var(--text-secondary)}
        body.dark-mode .stat-card-label{color:var(--dark-muted)}
        .data-card{background:var(--card);border-radius:20px;padding:24px;border:1px solid var(--border);box-shadow:var(--shadow-sm);margin-bottom:24px}
        body.dark-mode .data-card{background:var(--dark-card);border-color:var(--dark-border)}
        .data-card h3{font-size:18px;font-weight:700;margin-bottom:16px}
        .wallet-banner{background:linear-gradient(135deg,var(--primary),var(--accent-cyan));color:#FFF;border-radius:24px;padding:32px;margin-bottom:24px}
        .wallet-banner .amount{font-size:56px;font-weight:800;margin:12px 0}
        .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;text-transform:capitalize}
        .badge-success{background:rgba(0,200,150,0.1);color:#00C896}
        .badge-warning{background:rgba(255,181,71,0.1);color:#FFB547}
        .badge-pending{background:rgba(255,181,71,0.1);color:#FFB547}
        .leaderboard-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
        body.dark-mode .leaderboard-item{border-bottom-color:var(--dark-border)}
        .rank-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
        .rank-1{background:linear-gradient(135deg,#FFD700,#FFA500);color:#FFF}
        .rank-2{background:linear-gradient(135deg,#C0C0C0,#A8A8A8);color:#FFF}
        .rank-3{background:linear-gradient(135deg,#CD7F32,#A0522D);color:#FFF}
        .mobile-toggle{display:none;width:44px;height:44px;border-radius:12px;background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:20px;align-items:center;justify-content:center}
        body.dark-mode .mobile-toggle{background:var(--dark-card);border-color:var(--dark-border);color:var(--dark-text)}
        @media(max-width:992px){.aff-sidebar{transform:translateX(-100%)}.aff-sidebar.open{transform:translateX(0)}.aff-main{margin-left:0!important}.mobile-toggle{display:flex}}
        @media(max-width:768px){.aff-main{padding:20px}.stat-grid{grid-template-columns:repeat(2,1fr)}}
        @media(max-width:480px){.stat-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="aff-body">
<div id="sidebar-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:199" onclick="AffPage.toggleSidebar()"></div>
<aside class="aff-sidebar" id="aff-sidebar">
    <div class="aff-logo" onclick="window.location.href='index.html'"><div class="aff-logo-icon">R</div><span>RASAAI</span></div>
    <nav class="aff-nav">
        <a class="aff-nav-link active" data-section="dashboard" onclick="AffPage.loadSection('dashboard')"><span class="aff-nav-icon">📊</span>Dashboard</a>
        <a class="aff-nav-link" data-section="referrals" onclick="AffPage.loadSection('referrals')"><span class="aff-nav-icon">🔗</span>Referral Links</a>
        <a class="aff-nav-link" data-section="commissions" onclick="AffPage.loadSection('commissions')"><span class="aff-nav-icon">💰</span>Commissions</a>
        <a class="aff-nav-link" data-section="leaderboard" onclick="AffPage.loadSection('leaderboard')"><span class="aff-nav-icon">🏆</span>Leaderboard</a>
        <a class="aff-nav-link" data-section="wallet" onclick="AffPage.loadSection('wallet')"><span class="aff-nav-icon">💳</span>Wallet</a>
        <a class="aff-nav-link" data-section="profile" onclick="AffPage.loadSection('profile')"><span class="aff-nav-icon">👤</span>Profile</a>
    </nav>
    <div class="aff-sidebar-footer">
        <a class="aff-nav-link" href="index.html"><span class="aff-nav-icon">🏠</span>Home</a>
        <a class="aff-nav-link" onclick="Auth.logout()" style="cursor:pointer"><span class="aff-nav-icon">🚪</span>Logout</a>
    </div>
</aside>
<main class="aff-main">
    <div class="aff-topbar">
        <div style="display:flex;align-items:center;gap:12px">
            <button class="mobile-toggle" onclick="AffPage.toggleSidebar()">☰</button>
            <div><h1 id="aff-title">Affiliate Dashboard</h1><p style="color:var(--text-secondary);font-size:14px;margin:4px 0 0" id="aff-subtitle">Welcome</p></div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
            <button class="theme-toggle" onclick="App.applyTheme(App.state.theme==='light'?'dark':'light')" style="width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:18px">🌙</button>
            <div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent-cyan));display:flex;align-items:center;justify-content:center;color:#FFF;font-weight:700;cursor:pointer" id="aff-avatar">A</div>
        </div>
    </div>
    <div id="aff-content">
        <div class="aff-section active" id="sec-dashboard"></div>
        <div class="aff-section" id="sec-referrals"></div>
        <div class="aff-section" id="sec-commissions"></div>
        <div class="aff-section" id="sec-leaderboard"></div>
        <div class="aff-section" id="sec-wallet"></div>
        <div class="aff-section" id="sec-profile"></div>
    </div>
</main>
</div>
<div id="notification-container" class="notification-container" aria-live="polite" role="status"></div>
<script src="app.js"></script>
<script>
const AffPage={
    user:null,currentSection:'dashboard',
    init(){
        this.user=Auth.getCurrentUser();
        if(!this.user||(this.user.role!=='affiliate'&&this.user.role!=='admin'&&this.user.role!=='client')){window.location.href='login.html?redirect=affiliate.html';return;}
        document.getElementById('aff-subtitle').textContent=`Welcome, ${this.user.name.split(' ')[0]}`;
        document.getElementById('aff-avatar').textContent=this.user.name.charAt(0).toUpperCase();
        this.loadSection('dashboard');
    },
    toggleSidebar(){const s=document.getElementById('aff-sidebar'),o=document.getElementById('sidebar-overlay');s.classList.toggle('open');o.style.display=s.classList.contains('open')?'block':'none';},
    loadSection(section){
        this.currentSection=section;
        document.querySelectorAll('.aff-nav-link').forEach(l=>l.classList.remove('active'));
        document.querySelector(`[data-section="${section}"]`)?.classList.add('active');
        document.querySelectorAll('.aff-section').forEach(s=>s.classList.remove('active'));
        document.getElementById('sec-'+section)?.classList.add('active');
        document.getElementById('aff-title').textContent={dashboard:'Affiliate Dashboard',referrals:'Referral Links',commissions:'My Commissions',leaderboard:'Leaderboard',wallet:'Wallet',profile:'Profile'}[section]||'Dashboard';
        switch(section){case'dashboard':this.renderDashboard();break;case'referrals':this.renderReferrals();break;case'commissions':this.renderCommissions();break;case'leaderboard':this.renderLeaderboard();break;case'wallet':this.renderWallet();break;case'profile':this.renderProfile();break;}
    },
    renderDashboard(){
        const commission=AffiliateManager.getCommission(this.user.id);
        const stats=AffiliateManager.getReferralStats(this.user.id);
        document.getElementById('sec-dashboard').innerHTML=`
            <div class="wallet-banner"><h3 style="opacity:0.9">Available Balance</h3><div class="amount">₹${commission.toLocaleString()}</div><p>+₹${AffiliateManager.getPendingCommission(this.user.id).toLocaleString()} pending</p><button class="btn btn-outline mt-4" style="color:#FFF;border-color:#FFF" onclick="AffPage.requestWithdrawal()">💸 Withdraw</button></div>
            <div class="stat-grid"><div class="stat-card"><div class="stat-card-icon">🔗</div><div class="stat-card-value">${stats.clicks.toLocaleString()}</div><div class="stat-card-label">Total Clicks</div></div><div class="stat-card"><div class="stat-card-icon">👤</div><div class="stat-card-value">${stats.leads.toLocaleString()}</div><div class="stat-card-label">Leads</div></div><div class="stat-card"><div class="stat-card-icon">✅</div><div class="stat-card-value">${stats.conversions.toLocaleString()}</div><div class="stat-card-label">Conversions</div></div><div class="stat-card"><div class="stat-card-icon">💰</div><div class="stat-card-value">₹${(stats.totalEarned||0).toLocaleString()}</div><div class="stat-card-label">Total Earned</div></div></div>
            <div class="data-card"><h3>🏆 Top Earners</h3>${AffiliateManager.getLeaderboard(5).map((l,i)=>`<div class="leaderboard-item"><span class="rank-badge ${i<3?'rank-'+(i+1):''}">${i+1}</span><span style="flex:1">${l.name}</span><strong>₹${l.total.toLocaleString()}</strong></div>`).join('')}</div>`;
    },
    renderReferrals(){
        const link=AffiliateManager.generateReferralLink(this.user.id);
        document.getElementById('sec-referrals').innerHTML=`<div class="data-card"><h3>🔗 Your Referral Link</h3><p class="text-muted mb-4">Share this link to earn 10% commission on every booking!</p><div style="display:flex;gap:8px"><input type="text" value="${link}" readonly style="flex:1;font-family:monospace;padding:14px;border-radius:12px;border:1px solid var(--border)" id="ref-link"><button class="btn btn-primary" onclick="navigator.clipboard.writeText('${link}');Notify.success('Link copied!')">📋 Copy</button></div><div style="display:flex;gap:12px;margin-top:16px;flex-wrap:wrap"><button class="btn btn-outline" onclick="window.open('https://wa.me/919594306625?text='+encodeURIComponent('Join RASAAI: '+link),'_blank')">💬 Share via WhatsApp</button><button class="btn btn-outline" onclick="window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('Advertise on rickshaws in Mumbra! '+link),'_blank')">🐦 Share on Twitter</button></div></div>`;
    },
    renderCommissions(){
        const commissions=Storage.get('commissions',[]).filter(c=>c.userId===this.user.id);
        document.getElementById('sec-commissions').innerHTML=`<div class="data-card"><h3>💰 Commission History (${commissions.length})</h3>${commissions.length===0?'<p class="text-muted">No commissions yet. Share your referral link to start earning!</p>':`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr style="text-align:left;border-bottom:1px solid var(--border)"><th style="padding:12px">Date</th><th style="padding:12px">Campaign</th><th style="padding:12px">Amount</th><th style="padding:12px">Commission</th><th style="padding:12px">Status</th></tr></thead><tbody>${commissions.reverse().slice(0,50).map(c=>`<tr style="border-bottom:1px solid var(--border)"><td style="padding:12px;font-size:13px">${new Date(c.createdAt).toLocaleDateString()}</td><td style="padding:12px">${c.campaignId||'N/A'}</td><td style="padding:12px">₹${(c.amount||0).toLocaleString()}</td><td style="padding:12px"><strong>₹${(c.commission||0).toLocaleString()}</strong></td><td style="padding:12px"><span class="badge badge-${c.status==='credited'?'success':'warning'}">${c.status}</span></td></tr>`).join('')}</tbody></table></div>`}</div>`;
    },
    renderLeaderboard(){
        const lb=AffiliateManager.getLeaderboard(30);
        document.getElementById('sec-leaderboard').innerHTML=`<div class="data-card"><h3>🏆 Affiliate Leaderboard</h3>${lb.map((l,i)=>`<div class="leaderboard-item"><span class="rank-badge ${i<3?'rank-'+(i+1):''}">${i+1}</span><span style="flex:1;font-weight:${l.userId===this.user.id?'700':'400'}">${l.name}${l.userId===this.user.id?' (You)':''}</span><strong>₹${l.total.toLocaleString()}</strong></div>`).join('')||'<p class="text-muted">No data yet</p>'}</div>`;
    },
    renderWallet(){
        const balance=AffiliateManager.getCommission(this.user.id);
        const withdrawals=AffiliateManager.getWithdrawalHistory(this.user.id);
        document.getElementById('sec-wallet').innerHTML=`<div class="wallet-banner"><h3>Available Balance</h3><div class="amount">₹${balance.toLocaleString()}</div><button class="btn btn-outline mt-4" style="color:#FFF;border-color:#FFF" onclick="AffPage.requestWithdrawal()">💸 Withdraw Funds</button></div><div class="data-card"><h3>💸 Withdrawal History</h3>${withdrawals.length===0?'<p class="text-muted">No withdrawals yet</p>':withdrawals.map(w=>`<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)"><div><strong>₹${w.amount.toLocaleString()}</strong><p style="font-size:12px;color:var(--text-secondary)">${new Date(w.requestedAt).toLocaleDateString()}</p></div><span class="badge badge-${w.status==='approved'?'success':w.status==='rejected'?'warning':'pending'}">${w.status}</span></div>`).join('')}</div>`;
    },
    renderProfile(){
        document.getElementById('sec-profile').innerHTML=`<div class="data-card" style="max-width:500px"><h3>👤 Profile</h3><form onsubmit="return false"><div class="form-group"><label>Name</label><input type="text" id="prof-name" value="${this.user.name||''}"></div><div class="form-group"><label>Email</label><input type="email" value="${this.user.email||''}" disabled></div><div class="form-group"><label>Phone</label><input type="tel" id="prof-phone" value="${this.user.phone||''}"></div><div class="form-group"><label>New Password</label><input type="password" id="prof-password" placeholder="Leave blank"></div><button type="button" class="btn btn-primary mt-4" onclick="AffPage.updateProfile()">💾 Update</button></form></div>`;
    },
    requestWithdrawal(){const a=prompt('Enter amount (min ₹500):');if(!a)return;const r=AffiliateManager.requestWithdrawal(this.user.id,parseInt(a));r.success?Notify.success('Withdrawal requested!'):Notify.error(r.message);},
    updateProfile(){const u={name:document.getElementById('prof-name')?.value,phone:document.getElementById('prof-phone')?.value};const p=document.getElementById('prof-password')?.value;if(p)u.password=p;if(Auth.updateProfile(u)){this.user=Auth.getCurrentUser();Notify.success('Updated!');}}
};
document.addEventListener('DOMContentLoaded',()=>AffPage.init());
if(document.readyState!=='loading')AffPage.init();
</script>
</body>
</html>
