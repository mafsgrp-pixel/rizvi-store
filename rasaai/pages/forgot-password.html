<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#221F60">
    <meta name="description" content="Reset your RASAAI account password">
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="icon" type="image/x-icon" href="/rasaai/assets/images/favicon.ico">
    <link rel="manifest" href="/rasaai/manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/rasaai/css/main.css">
    <link rel="stylesheet" href="/rasaai/css/layout.css">
    <link rel="stylesheet" href="/rasaai/css/components.css">
    <link rel="stylesheet" href="/rasaai/css/mobile.css">
    <link rel="stylesheet" href="/rasaai/css/animations.css">
    
    <title>Forgot Password - RASAAI</title>
</head>
<body class="bg-gray-50">
    
    <div class="page-wrapper">
        <div class="page-body flex-center" style="min-height:100vh;padding:20px;">
            
            <div class="forgot-container" style="width:100%;max-width:420px;">
                
                <!-- Logo -->
                <div class="text-center mb-2xl">
                    <a href="/rasaai/index.html">
                        <img src="/rasaai/assets/images/logo.svg" alt="RASAAI" height="36" style="margin:0 auto;">
                    </a>
                </div>
                
                <!-- Card -->
                <div class="card" style="padding:32px;" id="forgot-card">
                    
                    <!-- Step 1: Enter Email -->
                    <div id="step-email">
                        <div class="text-center mb-xl">
                            <div style="font-size:48px;margin-bottom:12px;">🔑</div>
                            <h3 style="font-size:20px;font-weight:700;color:#221F60;margin-bottom:8px;">Forgot Password?</h3>
                            <p style="font-size:14px;color:#6C757D;">Enter your email and we'll send you a reset link.</p>
                        </div>
                        
                        <div id="forgot-error" class="alert alert-danger hidden" style="margin-bottom:16px;">
                            <span>❌</span>
                            <span id="forgot-error-text"></span>
                        </div>
                        
                        <div id="forgot-success" class="alert alert-success hidden" style="margin-bottom:16px;">
                            <span>✅</span>
                            <span id="forgot-success-text"></span>
                        </div>
                        
                        <form onsubmit="handleForgotPassword(event)" novalidate>
                            <div class="form-group">
                                <label class="form-label" for="forgot-email">Email Address</label>
                                <input type="email" id="forgot-email" name="email" 
                                       placeholder="Enter your registered email" 
                                       required autocomplete="email">
                                <div class="form-error">Please enter a valid email</div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary btn-full" id="forgot-submit-btn">
                                📧 Send Reset Link
                            </button>
                        </form>
                        
                        <div class="text-center mt-lg">
                            <a href="/rasaai/pages/login.html" style="color:#FF5A00;font-size:14px;font-weight:500;">
                                ← Back to Login
                            </a>
                        </div>
                    </div>
                    
                    <!-- Step 2: Check Email (hidden initially) -->
                    <div id="step-sent" class="hidden text-center">
                        <div style="font-size:64px;margin-bottom:16px;">📬</div>
                        <h3 style="font-size:20px;font-weight:700;color:#221F60;margin-bottom:8px;">Check Your Email</h3>
                        <p style="font-size:14px;color:#6C757D;margin-bottom:20px;">
                            We've sent a password reset link to <strong id="sent-email"></strong>.
                            Please check your inbox and spam folder.
                        </p>
                        <button class="btn btn-outline btn-full" onclick="resetForm()">
                            🔄 Try Another Email
                        </button>
                        <div class="text-center mt-lg">
                            <a href="/rasaai/pages/login.html" style="color:#FF5A00;font-size:14px;font-weight:500;">
                                ← Back to Login
                            </a>
                        </div>
                    </div>
                    
                </div>
                
                <!-- Help -->
                <div class="text-center mt-lg">
                    <p style="font-size:13px;color:#ADB5BD;">
                        Still having trouble? 
                        <a href="https://wa.me/919594306625" target="_blank" style="color:#25D366;font-weight:500;">
                            💬 WhatsApp Support
                        </a>
                    </p>
                </div>
                
            </div>
        </div>
    </div>

    <script src="/rasaai/js/data/constants.js"></script>
    <script src="/rasaai/js/data/demo-users.js"></script>
    <script src="/rasaai/js/utils/helpers.js"></script>
    <script src="/rasaai/js/utils/validators.js"></script>
    <script src="/rasaai/js/utils/formatters.js"></script>
    <script src="/rasaai/js/utils/error-handler.js"></script>
    <script src="/rasaai/js/core/config.js"></script>
    <script src="/rasaai/js/core/auth.js"></script>
    <script src="/rasaai/js/core/state.js"></script>
    <script src="/rasaai/js/core/router.js"></script>
    <script src="/rasaai/js/modules/notifications.js"></script>
    
    <script>
        function handleForgotPassword(event) {
            event.preventDefault();
            
            var email = document.getElementById('forgot-email').value.trim();
            var errorEl = document.getElementById('forgot-error');
            var errorText = document.getElementById('forgot-error-text');
            var submitBtn = document.getElementById('forgot-submit-btn');
            
            errorEl.classList.add('hidden');
            
            if (!email || !isValidEmail(email)) {
                errorEl.classList.remove('hidden');
                errorText.textContent = 'Please enter a valid email address.';
                return;
            }
            
            // Check if email exists
            var user = DEMO_USERS.find(function(u) { 
                return u.email.toLowerCase() === email.toLowerCase(); 
            });
            
            if (!user) {
                errorEl.classList.remove('hidden');
                errorText.textContent = 'No account found with this email address.';
                return;
            }
            
            // Simulate sending email
            submitBtn.disabled = true;
            submitBtn.innerHTML = '⏳ Sending...';
            
            setTimeout(function() {
                document.getElementById('step-email').classList.add('hidden');
                document.getElementById('step-sent').classList.remove('hidden');
                document.getElementById('sent-email').textContent = email;
                document.getElementById('forgot-success').classList.remove('hidden');
                document.getElementById('forgot-success-text').textContent = 
                    'Password reset link sent! (Demo: Check console)';
                
                // For demo: show reset link in console
                console.log('🔑 Password Reset Link (Demo):');
                console.log('Email:', email);
                console.log('Reset URL: /rasaai/pages/login.html?reset=true&email=' + encodeURIComponent(email));
                console.log('Demo password: ' + user.password);
                
                submitBtn.disabled = false;
                submitBtn.innerHTML = '📧 Send Reset Link';
            }, 1500);
        }
        
        function resetForm() {
            document.getElementById('step-email').classList.remove('hidden');
            document.getElementById('step-sent').classList.add('hidden');
            document.getElementById('forgot-error').classList.add('hidden');
            document.getElementById('forgot-success').classList.add('hidden');
            document.getElementById('forgot-email').value = '';
        }
    </script>
</body>
</html>
