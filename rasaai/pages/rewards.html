<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#221F60">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="/rasaai/assets/images/favicon.ico">
    <link rel="manifest" href="/rasaai/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/rasaai/css/main.css">
    <link rel="stylesheet" href="/rasaai/css/layout.css">
    <link rel="stylesheet" href="/rasaai/css/components.css">
    <link rel="stylesheet" href="/rasaai/css/dashboard.css">
    <link rel="stylesheet" href="/rasaai/css/mobile.css">
    <link rel="stylesheet" href="/rasaai/css/animations.css">
    <title>Rewards - RASAAI</title>
</head>
<body class="dashboard-body">
    <main class="dashboard-main" style="margin-left:0;">
        <header class="dashboard-header">
            <div class="dashboard-header-left"><h1 class="dashboard-header-title">🎁 Rewards</h1></div>
            <div class="dashboard-header-right"><button class="header-user-btn" onclick="logout()"><div class="header-user-avatar" id="header-avatar">U</div><span class="header-user-name" id="header-name">User</span></button></div>
        </header>
        <div class="dashboard-content" style="max-width:800px;margin:0 auto;">
            <div class="wallet-card mb-xl"><div class="wallet-label">Your Balance</div><div class="wallet-balance" id="coins-balance">350 Coins</div><p style="color:rgba(255,255,255,0.6);">= ₹3.50 (100 coins = ₹1)</p></div>
            <div class="chart-widget"><div class="chart-widget-header"><span class="chart-widget-title">Redeem Rewards</span></div>
                <div class="rewards-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;">
                    <div class="card" style="text-align:center;"><div style="font-size:32px;">💵</div><h4>₹10 Cashback</h4><p style="font-size:12px;color:#6C757D;">Get ₹10 cashback</p><p style="font-weight:700;color:#221F60;">🪙 1,000 coins</p><button class="btn btn-sm btn-outline" disabled>Need 650 more</button></div>
                    <div class="card" style="text-align:center;"><div style="font-size:32px;">🎫</div><h4>₹25 Paytm</h4><p style="font-size:12px;color:#6C757D;">Get ₹25 Paytm cash</p><p style="font-weight:700;color:#221F60;">🪙 2,500 coins</p><button class="btn btn-sm btn-outline" disabled>Need 2,150 more</button></div>
                    <div class="card" style="text-align:center;"><div style="font-size:32px;">🏅</div><h4>Exclusive Badge</h4><p style="font-size:12px;color:#6C757D;">Unlock profile badge</p><p style="font-weight:700;color:#221F60;">🪙 500 coins</p><button class="btn btn-sm btn-outline" disabled>Need 150 more</button></div>
                    <div class="card" style="text-align:center;"><div style="font-size:32px;">💰</div><h4>₹50 UPI Cash</h4><p style="font-size:12px;color:#6C757D;">Get ₹50 via UPI</p><p style="font-weight:700;color:#221F60;">🪙 5,000 coins</p><button class="btn btn-sm btn-outline" disabled>Need 4,650 more</button></div>
                </div>
            </div>
        </div>
    </main>
    <script src="/rasaai/js/data/constants.js"></script>
    <script src="/rasaai/js/data/demo-users.js"></script>
    <script src="/rasaai/js/utils/helpers.js"></script>
    <script src="/rasaai/js/core/config.js"></script>
    <script src="/rasaai/js/core/auth.js"></script>
    <script src="/rasaai/js/core/router.js"></script>
    <script src="/rasaai/js/modules/gamification.js"></script>
    <script src="/rasaai/js/modules/notifications.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded',function(){
            var user=getCurrentUser();
            if(user){document.getElementById('header-avatar').textContent=getInitials(user.name);document.getElementById('header-name').textContent=user.name;}
            document.getElementById('coins-balance').textContent=(ScannerState?.totalCoins||350)+' Coins';
        });
    </script>
</body>
</html>
