<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#221F60">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="/rasaai/assets/images/favicon.ico">
    <link rel="manifest" href="/rasaai/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/rasaai/css/main.css">
    <link rel="stylesheet" href="/rasaai/css/layout.css">
    <link rel="stylesheet" href="/rasaai/css/components.css">
    <link rel="stylesheet" href="/rasaai/css/dashboard.css">
    <link rel="stylesheet" href="/rasaai/css/mobile.css">
    <link rel="stylesheet" href="/rasaai/css/animations.css">
    <title>Book Campaign - RASAAI</title>
</head>
<body class="dashboard-body">
    <main class="dashboard-main" style="margin-left:0;">
        <header class="dashboard-header">
            <div class="dashboard-header-left"><a href="/rasaai/index.html" style="font-size:20px;font-weight:900;color:#221F60;">RASAAI</a></div>
            <div class="dashboard-header-right"><button class="header-user-btn" onclick="logout()"><div class="header-user-avatar" id="header-avatar">U</div><span class="header-user-name" id="header-name">User</span></button></div>
        </header>
        <div class="dashboard-content" style="max-width:800px;margin:0 auto;">
            <div class="welcome-row"><div class="welcome-text"><h1>Book Your Campaign</h1><p>Fill in the details below to launch your ad campaign</p></div></div>
            <div class="card" style="padding:32px;">
                <form id="campaign-form" onsubmit="handleCampaignSubmit(event)" novalidate>
                    <div class="form-row"><div class="form-group"><label class="form-label form-label-required">Campaign Type</label><select id="campaign-type" required onchange="updateCalculator()"><option value="LED">LED Screen Ad</option><option value="Audio">Audio Announcement</option><option value="Combo">Combo (LED + Audio)</option></select></div><div class="form-group"><label class="form-label form-label-required">Select Zone</label><select id="campaign-zone" required onchange="updateCalculator()"></select></div></div>
                    <div class="form-row"><div class="form-group"><label class="form-label">Number of Rickshaws</label><input type="range" id="campaign-rickshaws" min="1" max="50" value="5" oninput="document.getElementById('rickshaws-val').textContent=this.value;updateCalculator();"><span class="range-value"><strong id="rickshaws-val">5</strong> rickshaws</span></div><div class="form-group"><label class="form-label">Campaign Duration (Days)</label><input type="range" id="campaign-days" min="1" max="90" value="7" oninput="document.getElementById('days-val').textContent=this.value;updateCalculator();"><span class="range-value"><strong id="days-val">7</strong> days</span></div></div>
                    <div class="form-row"><div class="form-group"><label class="form-label">Start Date</label><input type="date" id="campaign-start"></div><div class="form-group"><label class="form-label">End Date</label><input type="date" id="campaign-end"></div></div>
                    <div class="calculator-result mb-xl" id="cost-breakdown"><div class="result-row"><span>Base Price</span><span id="result-base">₹0</span></div><div class="result-row"><span>Zone Adjustment</span><span id="result-zone">₹0</span></div><div class="result-row hidden" id="bulk-row"><span>Bulk Discount (10%)</span><span id="result-bulk" class="text-green">-₹0</span></div><div class="result-row hidden" id="longterm-row"><span>Long-term Discount (5%)</span><span id="result-longterm" class="text-green">-₹0</span></div><div class="result-divider"></div><div class="result-row result-total"><span>Subtotal</span><span id="result-subtotal">₹0</span></div><div class="result-row"><span>GST (18%)</span><span id="result-gst">₹0</span></div><div class="result-divider"></div><div class="result-row result-grand"><span>Grand Total</span><span id="result-grand">₹0</span></div><div class="result-row"><span>Est. Impressions</span><span id="result-impressions">0</span></div></div>
                    <button type="submit" class="btn btn-orange btn-full btn-lg" id="submit-btn">🚀 Book This Campaign</button>
                    <div class="text-center mt-base"><a href="https://wa.me/919594306625" target="_blank" class="btn btn-whatsapp btn-full">💬 Book via WhatsApp</a></div>
                </form>
            </div>
        </div>
    </main>
    <script src="/rasaai/js/data/constants.js"></script>
    <script src="/rasaai/js/data/zones.js"></script>
    <script src="/rasaai/js/data/demo-users.js"></script>
    <script src="/rasaai/js/utils/helpers.js"></script>
    <script src="/rasaai/js/utils/validators.js"></script>
    <script src="/rasaai/js/utils/formatters.js"></script>
    <script src="/rasaai/js/core/config.js"></script>
    <script src="/rasaai/js/core/auth.js"></script>
    <script src="/rasaai/js/core/router.js"></script>
    <script src="/rasaai/js/modules/pricing.js"></script>
    <script src="/rasaai/js/modules/calculator.js"></script>
    <script src="/rasaai/js/modules/campaigns.js"></script>
    <script src="/rasaai/js/modules/notifications.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded',function(){
            if(!requireRole('client','admin','super_admin'))return;
            var user=getCurrentUser();
            if(user){document.getElementById('header-avatar').textContent=getInitials(user.name);document.getElementById('header-name').textContent=user.name;}
            var zoneSelect=document.getElementById('campaign-zone');
            MUMBRA_ZONES.forEach(function(z){var opt=document.createElement('option');opt.value=z.name;opt.textContent=z.name+' '+z.tierIcon;zoneSelect.appendChild(opt);});
            var params=getQueryParams();
            if(params.type)document.getElementById('campaign-type').value=params.type;
            if(params.rickshaws){document.getElementById('campaign-rickshaws').value=params.rickshaws;document.getElementById('rickshaws-val').textContent=params.rickshaws;}
            if(params.days){document.getElementById('campaign-days').value=params.days;document.getElementById('days-val').textContent=params.days;}
            updateCalculator();
        });
        function updateCalculator(){
            var type=document.getElementById('campaign-type').value;
            var zone=document.getElementById('campaign-zone').value||'Kausa';
            var rickshaws=parseInt(document.getElementById('campaign-rickshaws').value)||5;
            var days=parseInt(document.getElementById('campaign-days').value)||7;
            var result=calculateCampaignCost(type,zone,rickshaws,days);
            document.getElementById('result-base').textContent='₹'+formatIndianNumber(result.subtotal);
            document.getElementById('result-zone').textContent=(result.zoneMultiplier>=1?'+':'')+'₹'+formatIndianNumber(Math.round((result.zoneMultiplier-1)*result.basePrice*rickshaws*days));
            if(result.discountTotal>0){document.getElementById('bulk-row').classList.remove('hidden');document.getElementById('result-bulk').textContent='-₹'+formatIndianNumber(result.discountTotal);}else{document.getElementById('bulk-row').classList.add('hidden');}
            document.getElementById('result-subtotal').textContent='₹'+formatIndianNumber(result.afterDiscount);
            document.getElementById('result-gst').textContent='₹'+formatIndianNumber(result.gst.total);
            document.getElementById('result-grand').textContent='₹'+formatIndianNumber(result.grandTotal);
            document.getElementById('result-impressions').textContent=formatCompactNumber(result.estimatedImpressions);
        }
        async function handleCampaignSubmit(event){
            event.preventDefault();
            if(!isAuthenticated()){window.location.href='/rasaai/pages/login.html?redirect=campaign';return;}
            var type=document.getElementById('campaign-type').value;
            var zone=document.getElementById('campaign-zone').value;
            var rickshaws=parseInt(document.getElementById('campaign-rickshaws').value);
            var days=parseInt(document.getElementById('campaign-days').value);
            var startDate=document.getElementById('campaign-start').value;
            var endDate=document.getElementById('campaign-end').value;
            if(!zone){showToast('Please select a zone','warning');return;}
            var result=await createCampaign({type:type,zone:zone,rickshaws:rickshaws,days:days,start_date:startDate,end_date:endDate,client_email:getCurrentUserEmail(),client_name:getCurrentUser()?.name});
            if(result.success){showToast('Campaign booked successfully! 🎉','success');setTimeout(function(){window.location.href='/rasaai/pages/invoice.html';},1500);}else{showToast(result.error||'Booking failed','error');}
        }
    </script>
</body>
</html>
