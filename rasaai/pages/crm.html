<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#221F60">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="/rasaai/assets/images/favicon.ico">
    <link rel="manifest" href="/rasaai/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/rasaai/css/main.css">
    <link rel="stylesheet" href="/rasaai/css/layout.css">
    <link rel="stylesheet" href="/rasaai/css/components.css">
    <link rel="stylesheet" href="/rasaai/css/dashboard.css">
    <link rel="stylesheet" href="/rasaai/css/mobile.css">
    <link rel="stylesheet" href="/rasaai/css/animations.css">
    <title>CRM Pipeline - RASAAI</title>
</head>
<body class="dashboard-body">
    <main class="dashboard-main" style="margin-left:0;">
        <header class="dashboard-header">
            <div class="dashboard-header-left"><a href="/rasaai/index.html" style="font-size:20px;font-weight:900;color:#221F60;">RASAAI</a></div>
            <div class="dashboard-header-right">
                <button class="btn btn-sm btn-primary" onclick="showToast('New lead form coming soon!','info')">+ New Lead</button>
                <button class="header-user-btn" onclick="logout()"><div class="header-user-avatar" id="header-avatar">U</div><span class="header-user-name" id="header-name">User</span></button>
            </div>
        </header>
        <div class="dashboard-content" style="max-width:1400px;margin:0 auto;">
            <div class="welcome-row"><div class="welcome-text"><h1>CRM Pipeline</h1><p>Manage your leads and close more deals</p></div></div>
            <div class="stats-row">
                <div class="stat-card-dashboard"><div class="stat-card-icon-box blue">👥</div><div class="stat-card-info"><div class="stat-card-label">Total Leads</div><div class="stat-card-value">5</div></div></div>
                <div class="stat-card-dashboard"><div class="stat-card-icon-box yellow">⏳</div><div class="stat-card-info"><div class="stat-card-label">In Pipeline</div><div class="stat-card-value">3</div></div></div>
                <div class="stat-card-dashboard"><div class="stat-card-icon-box green">🏆</div><div class="stat-card-info"><div class="stat-card-label">Won</div><div class="stat-card-value">1</div></div></div>
                <div class="stat-card-dashboard"><div class="stat-card-icon-box purple">📊</div><div class="stat-card-info"><div class="stat-card-label">Conversion Rate</div><div class="stat-card-value">20%</div></div></div>
            </div>
            <div id="kanban-board"></div>
        </div>
    </main>
    <script src="/rasaai/js/data/constants.js"></script>
    <script src="/rasaai/js/data/demo-users.js"></script>
    <script src="/rasaai/js/utils/helpers.js"></script>
    <script src="/rasaai/js/utils/formatters.js"></script>
    <script src="/rasaai/js/core/config.js"></script>
    <script src="/rasaai/js/core/auth.js"></script>
    <script src="/rasaai/js/core/router.js"></script>
    <script src="/rasaai/js/modules/crm.js"></script>
    <script src="/rasaai/js/modules/notifications.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded',function(){
            if(!requireRole('sales','admin','super_admin'))return;
            var user=getCurrentUser();
            if(user){document.getElementById('header-avatar').textContent=getInitials(user.name);document.getElementById('header-name').textContent=user.name;}
            renderKanbanBoard('kanban-board');
        });
    </script>
</body>
</html>
