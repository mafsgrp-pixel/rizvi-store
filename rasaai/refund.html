<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | RASAAI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C4DF6'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-weight='bold'>R</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,sans-serif;background:#F7F8FC;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
        body.dark-mode{background:#0F1117;color:#fff}
        .code{font-size:140px;font-weight:900;background:linear-gradient(135deg,#6C4DF6,#00D4FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
        h1{font-size:28px;margin:16px 0}
        p{color:#6B7280;margin-bottom:32px;font-size:16px}
        body.dark-mode p{color:#9AA3B2}
        .btn{display:inline-block;padding:14px 32px;background:#6C4DF6;color:#fff;border-radius:14px;text-decoration:none;font-weight:600;font-size:16px;transition:all 0.3s;margin:0 8px}
        .btn:hover{background:#8A63FF;transform:scale(1.05)}
        .btn-outline{background:transparent;border:2px solid #6C4DF6;color:#6C4DF6}
        .btn-outline:hover{background:#6C4DF6;color:#fff}
    </style>
</head>
<body>
    <div>
        <div class="code">404</div>
        <h1>Oops! This Rickshaw Took a Wrong Turn</h1>
        <p>The page you're looking for doesn't exist or has moved to another zone.</p>
        <a href="index.html" class="btn">🏠 Go Home</a>
        <a href="dashboard.html" class="btn btn-outline">📊 Dashboard</a>
    </div>
</body>
</html>
