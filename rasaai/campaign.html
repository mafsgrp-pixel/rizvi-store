<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
    <meta name="theme-color" content="#6C4DF6">
    <title>Analytics - RASAAI</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://rizvi.store/rasaai/analytics.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C4DF6'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-weight='bold'>R</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .ana-page{min-height:100vh;background:var(--bg);padding:20px;padding-bottom:100px}
        body.dark-mode .ana-page{background:var(--dark-bg)}
        .ana-container{max-width:1200px;margin:0 auto}
        .ana-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:16px}
        .ana-header h1{font-size:26px;font-weight:800;margin:0}
        .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
        @media(max-width:480px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>
    <div class="ana-page">
        <div class="ana-container">
            <header class="app-header">
                <button class="back-btn" onclick="history.back()">←</button>
                <span class="title">Analytics</span>
                <button class="action-btn theme-toggle" onclick="App.applyTheme(App.state.theme==='light'?'dark':'light')">🌙</button>
            </header>

            <div class="ana-header" style="margin-top:20px">
                <h1>📈 Analytics Dashboard</h1>
                <div style="display:flex;gap:8px;flex-wrap:wrap">
                    <button class="btn btn-outline btn-sm" onclick="Analytics.exportCSV()">📥 CSV</button>
                    <button class="btn btn-outline btn-sm" onclick="Analytics.exportPDF()">📄 PDF</button>
                </div>
            </div>

            <div class="stat-grid" id="totals-grid"></div>

            <div class="chart-container" style="margin-bottom:24px">
                <h4 style="margin-bottom:12px">📊 Campaigns by Zone</h4>
                <canvas id="zone-chart" height="300"></canvas>
            </div>

            <div class="chart-container" style="margin-bottom:24px">
                <h4 style="margin-bottom:12px">📍 Zone Activity Heatmap</h4>
                <div class="heatmap-grid" id="heatmap-grid"></div>
                <div class="heatmap-legend"><span>Low</span><span class="heatmap-cell intensity-0" style="display:inline-block;width:16px;height:16px"></span><span class="heatmap-cell intensity-1" style="display:inline-block;width:16px;height:16px"></span><span class="heatmap-cell intensity-2" style="display:inline-block;width:16px;height:16px"></span><span class="heatmap-cell intensity-3" style="display:inline-block;width:16px;height:16px"></span><span class="heatmap-cell intensity-4" style="display:inline-block;width:16px;height:16px"></span><span class="heatmap-cell intensity-5" style="display:inline-block;width:16px;height:16px"></span><span>High</span></div>
            </div>

            <div class="data-table-container">
                <h4 class="p-6">📍 Zone Performance Table</h4>
                <div style="overflow-x:auto"><table class="data-table" id="zone-table"><thead><tr><th>Zone</th><th>Population</th><th>Traffic/Day</th><th>Impressions</th><th>Campaigns</th><th>Rickshaws</th><th>Utilization</th><th>Peak Hours</th></tr></thead><tbody></tbody></table></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
        <a href="campaign.html" class="bottom-nav-item"><span class="nav-icon">📢</span><span class="nav-label">Campaigns</span></a>
        <a href="campaign.html" class="bottom-nav-fab"><span>➕</span></a>
        <a href="analytics.html" class="bottom-nav-item active"><span class="nav-icon">📊</span><span class="nav-label">Stats</span></a>
        <a href="dashboard.html" class="bottom-nav-item"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
    </nav>

    <div id="notification-container" class="notification-container" aria-live="polite" role="status"></div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const totals = Analytics.getTotals();
            document.getElementById('totals-grid').innerHTML = `
                <div class="stat-card"><div class="stat-card-icon">📍</div><div class="stat-card-value">${totals.totalZones}</div><div class="stat-card-label">Zones</div></div>
                <div class="stat-card"><div class="stat-card-icon">👥</div><div class="stat-card-value">${totals.totalPopulation.toLocaleString()}</div><div class="stat-card-label">Population</div></div>
                <div class="stat-card"><div class="stat-card-icon">🚶</div><div class="stat-card-value">${totals.totalTraffic.toLocaleString()}</div><div class="stat-card-label">Daily Traffic</div></div>
                <div class="stat-card"><div class="stat-card-icon">👁️</div><div class="stat-card-value">${totals.totalImpressions.toLocaleString()}</div><div class="stat-card-label">Impressions</div></div>
                <div class="stat-card"><div class="stat-card-icon">📢</div><div class="stat-card-value">${totals.totalCampaigns}</div><div class="stat-card-label">Campaigns</div></div>
                <div class="stat-card"><div class="stat-card-icon">🛺</div><div class="stat-card-value">${totals.availableRickshaws}/${totals.totalRickshaws}</div><div class="stat-card-label">Rickshaws</div></div>
                <div class="stat-card"><div class="stat-card-icon">💰</div><div class="stat-card-value">₹${totals.totalRevenue.toLocaleString()}</div><div class="stat-card-label">Revenue</div></div>
                <div class="stat-card"><div class="stat-card-icon">✅</div><div class="stat-card-value">${totals.paidInvoices}</div><div class="stat-card-label">Paid Invoices</div></div>
            `;

            const data = Analytics.generateZoneData();
            document.getElementById('zone-table').querySelector('tbody').innerHTML = data.map(z => `
                <tr><td><strong>${z.icon} ${z.name}</strong></td><td>${z.population.toLocaleString()}</td><td>${z.traffic.toLocaleString()}</td><td>${z.impressions.toLocaleString()}</td><td>${z.campaigns}</td><td>${z.available}/${z.total}</td><td>${z.utilization}%</td><td>${z.peakHours}</td></tr>
            `).join('');

            // Heatmap
            const heatmapGrid = document.getElementById('heatmap-grid');
            if (heatmapGrid) {
                let cells = '';
                for (let i = 0; i < 35; i++) {
                    const intensity = Math.floor(Math.random() * 6);
                    cells += `<div class="heatmap-cell intensity-${intensity}" title="Activity Level: ${intensity}/5"></div>`;
                }
                heatmapGrid.innerHTML = cells;
            }

            // Chart
            setTimeout(() => {
                const canvas = document.getElementById('zone-chart');
                if (canvas && window.Dashboard) {
                    const zones = data.slice(0, 12);
                    Dashboard.drawBarChart(canvas.getContext('2d'), canvas.parentElement.offsetWidth - 48, 300, zones.map(z => z.name.split(' ')[0]), zones.map(z => z.campaigns || Math.floor(Math.random() * 15) + 2));
                }
            }, 300);
        });
    </script>
</body>
</html>
