<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RASAAI - Rickshaw Advertising Network | Mumbra</title>
    <style>
        :root {
            --bg: #F7F8FC; --card: #fff; --primary: #6C4DF6; --text: #111; --muted: #6B7280;
            --border: #E5E7EB; --success: #00C896; --warning: #FFB547; --danger: #FF4D6D;
            --radius: 16px; --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .dark { --bg: #0F1117; --card: #1a1f2e; --text: #fff; --muted: #9AA3B2; --border: #2a2e3a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* Header */
        header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 0; position: sticky; top: 0; z-index: 100; }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); text-decoration: none; }
        nav a { margin-left: 20px; text-decoration: none; color: var(--text); font-weight: 500; font-size: 14px; }
        nav a:hover { color: var(--primary); }
        
        /* Buttons */
        .btn { display: inline-block; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; font-size: 14px; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-whatsapp { background: #25D366; color: #fff; }
        .btn-sm { padding: 8px 16px; font-size: 13px; }
        .btn-lg { padding: 16px 32px; font-size: 16px; }
        .btn-block { display: block; width: 100%; text-align: center; }
        
        /* Cards */
        .card { background: var(--card); border-radius: var(--radius); padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 16px; }
        
        /* Hero */
        .hero { padding: 80px 0; text-align: center; }
        .hero h1 { font-size: 48px; font-weight: 900; line-height: 1.1; margin-bottom: 16px; }
        .hero h1 span { color: var(--primary); }
        .hero p { font-size: 18px; color: var(--muted); max-width: 600px; margin: 0 auto 32px; }
        
        /* Grid */
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        @media (max-width: 768px) { .grid-3, .grid-4 { grid-template-columns: 1fr; } .hero h1 { font-size: 32px; } }
        
        /* Stats */
        .stat-card { text-align: center; padding: 24px; }
        .stat-card .icon { font-size: 40px; margin-bottom: 8px; }
        .stat-card .value { font-size: 32px; font-weight: 800; color: var(--primary); }
        .stat-card .label { font-size: 13px; color: var(--muted); }
        
        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { font-weight: 600; color: var(--muted); font-size: 12px; text-transform: uppercase; }
        
        /* Forms */
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; background: var(--card); color: var(--text); margin-bottom: 12px; }
        label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 13px; }
        
        /* Badges */
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        
        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 500; font-size: 14px; border: 1px solid var(--border); background: transparent; color: var(--text); }
        .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        /* Mobile nav */
        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); padding: 8px; z-index: 200; }
        .mobile-nav a { flex: 1; text-align: center; text-decoration: none; color: var(--muted); font-size: 11px; padding: 8px; }
        .mobile-nav a.active { color: var(--primary); }
        @media (max-width: 768px) { .mobile-nav { display: flex; } body { padding-bottom: 70px; } }
        
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 8px; } .mt-4 { margin-top: 16px; } .mt-6 { margin-top: 24px; }
        .mb-2 { margin-bottom: 8px; } .mb-4 { margin-bottom: 16px; }
    </style>
</head>

function fillLogin(email, password) {
    document.getElementById('login-email').value = email;
    document.getElementById('login-password').value = password;
}

function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');
    
    if (!email || !password) {
        errorEl.textContent = 'Please enter email and password';
        errorEl.style.display = 'block';
        return;
    }
    
    // Reload DB fresh
    DB.init();
    
    const user = DB.users.find(u => u.email === email && u.password === password);
    
    if (user) {
        currentUser = { ...user };
        delete currentUser.password;
        localStorage.setItem('rasaai_currentUser', JSON.stringify(currentUser));
        errorEl.style.display = 'none';
        showPage('dashboard');
    } else {
        errorEl.textContent = 'Invalid email or password. Try demo accounts below.';
        errorEl.style.display = 'block';
    }
}

function renderDashboard() {
    if (!currentUser) {
        showPage('login');

    switch(currentUser.role) {
        case 'admin': renderAdminDashboard(); break;
        case 'client': renderClientDashboard(); break;
        case 'driver': renderDriverDashboard(); break;
        case 'affiliate': renderAffiliateDashboard(); break;
        case 'sales': renderSalesDashboard(); break;
        default: renderClientDashboard();
    }
}

function switchAdminTab(tab) {

function addLead() {
    const name = prompt('Lead Name:');
    if (!name) return;
    const company = prompt('Company:');
    const value = parseInt(prompt('Estimated Value (₹):', '0')) || 0;
    
    DB.leads.push({
        id: 'LEAD' + Date.now(),
        name,
        company: company || '',
        value,
        status: 'New',
        assignedTo: currentUser.id,
        createdAt: new Date().toISOString()
    });
    DB.save();
    showPage('dashboard');
}

function updateLeadStatus(id) {
    const lead = DB.leads.find(l => l.id === id);
    if (!lead) return;
    const statuses = ['New', 'Contacted', 'Qualified', 'Proposal Sent', 'Won', 'Lost'];
    const current = statuses.indexOf(lead.status);
    const next = statuses[(current + 1) % statuses.length];
    lead.status = next;
    lead.updatedAt = new Date().toISOString();
    DB.save();
    showPage('dashboard');
}

                <button class="btn btn-primary btn-block btn-lg mt-6" onclick="bookCampaign()">🚀 Book Campaign Now</button>
                <p style="text-align:center;margin-top:8px;color:var(--muted);font-size:13px">

                </p>
            </div>
        </div>
    `;

function bookCampaign() {
    const name = document.getElementById('camp-name').value.trim();
    if (!name) { alert('Please enter a campaign name'); return; }
    
    const type = document.getElementById('camp-type').value;
    const zone = document.getElementById('camp-zone').value;
    const qty = parseInt(document.getElementById('camp-qty').value);
    const days = parseInt(document.getElementById('camp-days').value);
    
    // Calculate cost
    const basePrice = type === 'led' ? Math.floor(Math.random()*410)+1238 : 
                     type === 'audio' ? Math.floor(Math.random()*322)+318 : 
                     Math.floor(Math.random()*410)+1238 + Math.floor(Math.random()*322)+318;
    let cost = basePrice * qty * days;
    if (qty >= 10) cost = Math.round(cost * 0.90);
    
    const campaign = {
        id: 'CAM' + Date.now(),
        name,
        type,
        zone,
        qty,
        days,
        startDate: document.getElementById('camp-start').value,
        hashtag: document.getElementById('camp-hashtag').value,
        contest: document.getElementById('camp-contest').value,
        cost,
        impressions: Math.floor(Math.random()*500000)+100000,
        status: 'active',
        clientId: currentUser.id,
        clientName: currentUser.name,
        createdAt: new Date().toISOString()
    };
    
    DB.campaigns.push(campaign);
    
    // Generate invoice
    const gst = Math.round(cost * 0.18);
    DB.invoices.push({
        id: 'INV' + Date.now(),
        invoiceNumber: 'INV-2025-' + String(DB.invoices.length + 1).padStart(4, '0'),
        campaignId: campaign.id,
        clientId: currentUser.id,
        customerName: currentUser.name,
        subtotal: cost,
        gst,
        total: cost + gst,
        status: 'pending',
        createdAt: new Date().toISOString()
    });
    
    // Create driver task
    DB.tasks.push({
        id: 'TASK' + Date.now(),
        title: `Campaign: ${name} - ${zone}`,
        driverId: 'DRV001',
        status: 'pending',
        dueDate: new Date(Date.now() + days*86400000).toISOString().split('T')[0],
        createdAt: new Date().toISOString()
    });
    
    DB.save();
    
    alert('✅ Campaign booked successfully!\n\nCampaign: ' + name + '\nZone: ' + zone + '\nCost: ₹' + cost.toLocaleString() + '\n\n🎁 FREE 30 Social Media Creatives included!');
    showPage('dashboard');
}
