<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
    <meta name="theme-color" content="#6C4DF6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0F1117" media="(prefers-color-scheme: dark)">
    <meta name="color-scheme" content="light dark">
    
    <title>Register - RASAAI Outdoor Advertising Network</title>
    <meta name="description" content="Create your RASAAI account. Start advertising on moving rickshaws across Mumbra. Free registration.">
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="canonical" href="https://rizvi.store/rasaai/register.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C4DF6'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-weight='bold'>R</text></svg>">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rizvi.store/rasaai/register.html">
    <meta property="og:title" content="Register - RASAAI">
    <meta property="og:site_name" content="RASAAI">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .register-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            background: var(--bg);
        }
        body.dark-mode .register-page {
            background: var(--dark-bg);
        }
        .register-container {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }
        .register-card {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            max-height: 90vh;
            overflow-y: auto;
        }
        body.dark-mode .register-card {
            background: var(--dark-card);
            border-color: var(--dark-border);
            box-shadow: var(--dark-shadow);
        }
        .register-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .register-logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--accent-cyan));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFF;
            font-size: 24px;
            font-weight: 900;
        }
        .register-logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .register-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 14px;
        }
        body.dark-mode .register-subtitle {
            color: var(--dark-muted);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text);
        }
        .form-group label .required {
            color: var(--danger);
        }
        body.dark-mode .form-group label {
            color: var(--dark-text);
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border-radius: var(--radius-input);
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            transition: all var(--transition-fast);
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108,77,246,0.1);
            outline: none;
        }
        body.dark-mode .form-group input,
        body.dark-mode .form-group select {
            background: var(--dark-input-bg);
            border-color: var(--dark-border);
            color: var(--dark-text);
        }
        .form-group input.input-error {
            border-color: var(--danger) !important;
            box-shadow: 0 0 0 3px rgba(255,77,109,0.1) !important;
        }
        .field-error {
            font-size: 12px;
            color: var(--danger);
            margin-top: 4px;
            display: none;
        }
        .field-error.show {
            display: block;
        }
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 6px;
            transition: all 0.3s;
        }
        .password-strength.weak { background: var(--danger); width: 33%; }
        .password-strength.medium { background: var(--warning); width: 66%; }
        .password-strength.strong { background: var(--success); width: 100%; }
        .terms-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .terms-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: var(--primary);
            flex-shrink: 0;
        }
        .terms-row a {
            color: var(--primary);
            font-weight: 500;
        }
        .terms-row a:hover {
            text-decoration: underline;
        }
        body.dark-mode .terms-row {
            color: var(--dark-muted);
        }
        body.dark-mode .terms-row a {
            color: var(--dark-primary);
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .login-link a {
            color: var(--primary);
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        body.dark-mode .login-link {
            color: var(--dark-muted);
        }
        body.dark-mode .login-link a {
            color: var(--dark-primary);
        }
        .error-message {
            background: rgba(255,77,109,0.1);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            border: 1px solid rgba(255,77,109,0.2);
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: rgba(0,200,150,0.1);
            color: var(--success);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            border: 1px solid rgba(0,200,150,0.2);
            text-align: center;
        }
        .success-message.show {
            display: block;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #FFF;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            pointer-events: none;
        }
        .progress-steps {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        .progress-step {
            width: 32px;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            transition: all 0.3s;
        }
        .progress-step.active {
            background: var(--primary);
        }
        .progress-step.done {
            background: var(--success);
        }
        body.dark-mode .progress-step {
            background: var(--dark-border);
        }
    </style>
</head>
<body>
    <div class="register-page">
        <!-- Background Glows -->
        <div class="background-glow glow-primary" style="width:500px;height:500px;top:-30%;left:-20%" aria-hidden="true"></div>
        <div class="background-glow glow-accent" style="width:400px;height:400px;bottom:-20%;right:-10%" aria-hidden="true"></div>
        
        <div class="register-container">
            <div class="register-card">
                <!-- Logo -->
                <div class="register-logo">
                    <div class="register-logo-icon" aria-hidden="true">R</div>
                    <span class="register-logo-text">RASAAI</span>
                </div>
                <p class="register-subtitle">Create your free account and start advertising</p>
                
                <!-- Progress Steps -->
                <div class="progress-steps" aria-hidden="true">
                    <div class="progress-step active" id="step-1-indicator"></div>
                    <div class="progress-step" id="step-2-indicator"></div>
                    <div class="progress-step" id="step-3-indicator"></div>
                    <div class="progress-step" id="step-4-indicator"></div>
                </div>
                
                <!-- Error Message -->
                <div class="error-message" id="register-error" role="alert"></div>
                
                <!-- Success Message -->
                <div class="success-message" id="register-success" role="status"></div>
                
                <!-- Registration Form -->
                <form id="register-form" onsubmit="return false;" novalidate>
                    
                    <!-- Step 1: Personal Info -->
                    <div id="form-step-1">
                        <div class="form-group">
                            <label for="reg-name">Full Name <span class="required">*</span></label>
                            <input type="text" id="reg-name" placeholder="Enter your full name" required autocomplete="name" autofocus>
                            <div class="field-error" id="error-name"></div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="reg-email">Email Address <span class="required">*</span></label>
                                <input type="email" id="reg-email" placeholder="your@email.com" required autocomplete="email">
                                <div class="field-error" id="error-email"></div>
                            </div>
                            <div class="form-group">
                                <label for="reg-phone">Phone Number <span class="required">*</span></label>
                                <input type="tel" id="reg-phone" placeholder="+91 XXXXXXXXXX" required autocomplete="tel">
                                <div class="field-error" id="error-phone"></div>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="reg-password">Password <span class="required">*</span></label>
                                <input type="password" id="reg-password" placeholder="Min 6 characters" required autocomplete="new-password" oninput="RegisterPage.checkPasswordStrength()">
                                <div class="password-strength" id="password-strength-bar"></div>
                                <div class="field-error" id="error-password"></div>
                            </div>
                            <div class="form-group">
                                <label for="reg-confirm-password">Confirm Password <span class="required">*</span></label>
                                <input type="password" id="reg-confirm-password" placeholder="Re-enter password" required autocomplete="new-password">
                                <div class="field-error" id="error-confirm-password"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Step 2: Business Info -->
                    <div id="form-step-2" style="display:none">
                        <div class="form-group">
                            <label for="reg-company">Company / Business Name</label>
                            <input type="text" id="reg-company" placeholder="Your business name (optional)">
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="reg-gst">GST Number</label>
                                <input type="text" id="reg-gst" placeholder="27AAAAA0000A1Z5" maxlength="15">
                                <div class="field-error" id="error-gst"></div>
                            </div>
                            <div class="form-group">
                                <label for="reg-business-type">Business Type</label>
                                <select id="reg-business-type">
                                    <option value="">Select type</option>
                                    <option value="retail">Retail Shop</option>
                                    <option value="restaurant">Restaurant / Food</option>
                                    <option value="healthcare">Healthcare / Clinic</option>
                                    <option value="education">Education / Coaching</option>
                                    <option value="realestate">Real Estate</option>
                                    <option value="automobile">Automobile</option>
                                    <option value="fashion">Fashion / Boutique</option>
                                    <option value="finance">Finance / Insurance</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Step 3: Role Selection -->
                    <div id="form-step-3" style="display:none">
                        <div class="form-group">
                            <label for="reg-role">I want to join as <span class="required">*</span></label>
                            <select id="reg-role" required onchange="RegisterPage.onRoleChange()">
                                <option value="client">Advertiser / Business Owner</option>
                                <option value="driver">Rickshaw Driver</option>
                                <option value="affiliate">Affiliate Partner</option>
                                <option value="sales">Sales Representative</option>
                            </select>
                            <div class="field-error" id="error-role"></div>
                        </div>
                        
                        <!-- Driver specific fields -->
                        <div id="driver-fields" style="display:none">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="reg-rickshaw-id">Rickshaw Number / ID</label>
                                    <input type="text" id="reg-rickshaw-id" placeholder="e.g., RICK003">
                                </div>
                                <div class="form-group">
                                    <label for="reg-zone">Preferred Zone</label>
                                    <select id="reg-zone">
                                        <option value="">Select zone</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Affiliate specific fields -->
                        <div id="affiliate-fields" style="display:none">
                            <div class="form-group">
                                <label for="reg-referral-source">How did you hear about us?</label>
                                <select id="reg-referral-source">
                                    <option value="">Select</option>
                                    <option value="social_media">Social Media</option>
                                    <option value="friend">Friend / Colleague</option>
                                    <option value="search">Google Search</option>
                                    <option value="whatsapp">WhatsApp Group</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                        
                        <!-- Sales specific fields -->
                        <div id="sales-fields" style="display:none">
                            <div class="form-group">
                                <label for="reg-experience">Sales Experience</label>
                                <select id="reg-experience">
                                    <option value="">Select</option>
                                    <option value="0-1">0-1 Year</option>
                                    <option value="1-3">1-3 Years</option>
                                    <option value="3-5">3-5 Years</option>
                                    <option value="5+">5+ Years</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Step 4: Terms & Submit -->
                    <div id="form-step-4" style="display:none">
                        <div class="terms-row">
                            <input type="checkbox" id="reg-terms" required>
                            <label for="reg-terms">I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a>. I understand that my ads will be displayed on rickshaws across Mumbra zones.</label>
                        </div>
                        <div class="field-error" id="error-terms"></div>
                        
                        <div class="terms-row">
                            <input type="checkbox" id="reg-whatsapp">
                            <label for="reg-whatsapp">Send me campaign updates and offers via WhatsApp</label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-submit-btn">
                            <span id="register-btn-text">🎉 Create My Free Account</span>
                        </button>
                    </div>
                    
                    <!-- Navigation Buttons -->
                    <div style="display:flex;gap:12px;margin-top:16px">
                        <button type="button" class="btn btn-outline btn-sm" id="prev-btn" style="display:none" onclick="RegisterPage.prevStep()">← Back</button>
                        <button type="button" class="btn btn-primary btn-sm" id="next-btn" style="margin-left:auto" onclick="RegisterPage.nextStep()">Next →</button>
                    </div>
                </form>
                
                <p class="login-link">
                    Already have an account? <a href="login.html">Sign In</a>
                </p>
            </div>
        </div>
    </div>
    
    <!-- Notification Container -->
    <div id="notification-container" class="notification-container" aria-live="polite" role="status"></div>
    
    <script src="app.js"></script>
    <script>
        const RegisterPage = {
            currentStep: 1,
            totalSteps: 4,
            
            init() {
                // Redirect if already logged in
                if (Auth.isLoggedIn()) {
                    window.location.href = 'dashboard.html';
                    return;
                }
                
                // Populate zone selector
                const zoneSelect = document.getElementById('reg-zone');
                if (zoneSelect && typeof CampaignCalculator !== 'undefined') {
                    CampaignCalculator.getZones().forEach(z => {
                        zoneSelect.innerHTML += `<option value="${z.id}">${z.name}</option>`;
                    });
                }
                
                // Handle referral code
                const params = new URLSearchParams(window.location.search);
                const refCode = params.get('ref');
                if (refCode) {
                    Storage.set('referralCode', refCode);
                }
                
                this.updateStepUI();
            },
            
            nextStep() {
                if (this.currentStep >= this.totalSteps) return;
                
                // Validate current step
                if (!this.validateStep(this.currentStep)) return;
                
                this.currentStep++;
                this.updateStepUI();
                
                // Scroll to top of form
                document.querySelector('.register-card').scrollTop = 0;
            },
            
            prevStep() {
                if (this.currentStep <= 1) return;
                this.currentStep--;
                this.updateStepUI();
                document.querySelector('.register-card').scrollTop = 0;
            },
            
            updateStepUI() {
                // Show/hide steps
                for (let i = 1; i <= this.totalSteps; i++) {
                    const stepEl = document.getElementById('form-step-' + i);
                    if (stepEl) stepEl.style.display = i === this.currentStep ? 'block' : 'none';
                }
                
                // Update progress indicators
                for (let i = 1; i <= this.totalSteps; i++) {
                    const indicator = document.getElementById('step-' + i + '-indicator');
                    if (indicator) {
                        indicator.className = 'progress-step';
                        if (i < this.currentStep) indicator.classList.add('done');
                        if (i === this.currentStep) indicator.classList.add('active');
                    }
                }
                
                // Show/hide navigation buttons
                const prevBtn = document.getElementById('prev-btn');
                const nextBtn = document.getElementById('next-btn');
                
                if (prevBtn) prevBtn.style.display = this.currentStep > 1 ? 'inline-flex' : 'none';
                if (nextBtn) nextBtn.style.display = this.currentStep < this.totalSteps ? 'inline-flex' : 'none';
                
                // Focus first input of current step
                setTimeout(() => {
                    const currentStepEl = document.getElementById('form-step-' + this.currentStep);
                    if (currentStepEl) {
                        const firstInput = currentStepEl.querySelector('input:not([type="hidden"]), select');
                        if (firstInput) firstInput.focus();
                    }
                }, 100);
            },
            
            validateStep(step) {
                switch (step) {
                    case 1: return this.validatePersonalInfo();
                    case 2: return true; // Business info is optional
                    case 3: return this.validateRoleSelection();
                    case 4: return this.validateTerms();
                    default: return true;
                }
            },
            
            validatePersonalInfo() {
                let valid = true;
                const name = document.getElementById('reg-name').value.trim();
                const email = document.getElementById('reg-email').value.trim();
                const phone = document.getElementById('reg-phone').value.trim();
                const password = document.getElementById('reg-password').value;
                const confirmPassword = document.getElementById('reg-confirm-password').value;
                
                // Name
                if (!name || name.length < 2) {
                    this.showFieldError('error-name', 'Name must be at least 2 characters');
                    this.highlightField('reg-name', true);
                    valid = false;
                } else {
                    this.showFieldError('error-name', '');
                    this.highlightField('reg-name', false);
                }
                
                // Email
                if (!email || !this.isValidEmail(email)) {
                    this.showFieldError('error-email', 'Please enter a valid email address');
                    this.highlightField('reg-email', true);
                    valid = false;
                } else {
                    this.showFieldError('error-email', '');
                    this.highlightField('reg-email', false);
                }
                
                // Phone
                if (!phone || phone.replace(/[\s\-\+]/g, '').length < 10) {
                    this.showFieldError('error-phone', 'Please enter a valid phone number');
                    this.highlightField('reg-phone', true);
                    valid = false;
                } else {
                    this.showFieldError('error-phone', '');
                    this.highlightField('reg-phone', false);
                }
                
                // Password
                if (!password || password.length < 6) {
                    this.showFieldError('error-password', 'Password must be at least 6 characters');
                    this.highlightField('reg-password', true);
                    valid = false;
                } else {
                    this.showFieldError('error-password', '');
                    this.highlightField('reg-password', false);
                }
                
                // Confirm Password
                if (password !== confirmPassword) {
                    this.showFieldError('error-confirm-password', 'Passwords do not match');
                    this.highlightField('reg-confirm-password', true);
                    valid = false;
                } else {
                    this.showFieldError('error-confirm-password', '');
                    this.highlightField('reg-confirm-password', false);
                }
                
                return valid;
            },
            
            validateRoleSelection() {
                const role = document.getElementById('reg-role').value;
                if (!role) {
                    this.showFieldError('error-role', 'Please select a role');
                    return false;
                }
                this.showFieldError('error-role', '');
                return true;
            },
            
            validateTerms() {
                const termsChecked = document.getElementById('reg-terms').checked;
                if (!termsChecked) {
                    this.showFieldError('error-terms', 'You must agree to the Terms of Service');
                    return false;
                }
                this.showFieldError('error-terms', '');
                return true;
            },
            
            onRoleChange() {
                const role = document.getElementById('reg-role').value;
                document.getElementById('driver-fields').style.display = role === 'driver' ? 'block' : 'none';
                document.getElementById('affiliate-fields').style.display = role === 'affiliate' ? 'block' : 'none';
                document.getElementById('sales-fields').style.display = role === 'sales' ? 'block' : 'none';
            },
            
            checkPasswordStrength() {
                const password = document.getElementById('reg-password').value;
                const bar = document.getElementById('password-strength-bar');
                if (!bar) return;
                
                bar.className = 'password-strength';
                
                if (password.length === 0) return;
                if (password.length < 6) {
                    bar.classList.add('weak');
                } else if (password.length < 8 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
                    bar.classList.add('medium');
                } else {
                    bar.classList.add('strong');
                }
            },
            
            async handleSubmit() {
                const errorEl = document.getElementById('register-error');
                const successEl = document.getElementById('register-success');
                const submitBtn = document.getElementById('register-submit-btn');
                const btnText = document.getElementById('register-btn-text');
                
                // Validate all steps
                if (!this.validatePersonalInfo()) {
                    this.currentStep = 1;
                    this.updateStepUI();
                    return;
                }
                if (!this.validateRoleSelection()) {
                    this.currentStep = 3;
                    this.updateStepUI();
                    return;
                }
                if (!this.validateTerms()) return;
                
                // Hide error
                errorEl.classList.remove('show');
                
                // Collect form data
                const userData = {
                    name: document.getElementById('reg-name').value.trim(),
                    email: document.getElementById('reg-email').value.trim(),
                    phone: document.getElementById('reg-phone').value.trim(),
                    password: document.getElementById('reg-password').value,
                    role: document.getElementById('reg-role').value || 'client',
                    company: document.getElementById('reg-company').value.trim(),
                    gst: document.getElementById('reg-gst').value.trim(),
                    businessType: document.getElementById('reg-business-type').value,
                    rickshawId: document.getElementById('reg-rickshaw-id')?.value.trim(),
                    zone: document.getElementById('reg-zone')?.value,
                    referralSource: document.getElementById('reg-referral-source')?.value,
                    experience: document.getElementById('reg-experience')?.value,
                    whatsappUpdates: document.getElementById('reg-whatsapp').checked
                };
                
                // Show loading
                submitBtn.disabled = true;
                btnText.innerHTML = '<span class="loading-spinner"></span> Creating account...';
                
                // Simulate network delay
                setTimeout(() => {
                    const result = Auth.register(userData);
                    
                    if (result.success) {
                        // Handle referral
                        const refCode = Storage.get('referralCode');
                        if (refCode) {
                            AffiliateManager.trackLead(refCode);
                            Storage.remove('referralCode');
                        }
                        
                        // Show success
                        successEl.innerHTML = '✅ Account created successfully! Redirecting to login...';
                        successEl.classList.add('show');
                        btnText.textContent = '✅ Done!';
                        
                        // Redirect to login
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 1500);
                    } else {
                        errorEl.textContent = '❌ ' + (result.message || 'Registration failed. Please try again.');
                        errorEl.classList.add('show');
                        submitBtn.disabled = false;
                        btnText.textContent = '🎉 Create My Free Account';
                    }
                }, 800);
            },
            
            showFieldError(id, message) {
                const el = document.getElementById(id);
                if (!el) return;
                el.textContent = message;
                if (message) {
                    el.classList.add('show');
                } else {
                    el.classList.remove('show');
                }
            },
            
            highlightField(id, isError) {
                const el = document.getElementById(id);
                if (!el) return;
                if (isError) {
                    el.classList.add('input-error');
                } else {
                    el.classList.remove('input-error');
                }
            },
            
            isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }
        };
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            RegisterPage.init();
            
            // Form submit handler
            document.getElementById('register-form').addEventListener('submit', (e) => {
                e.preventDefault();
                RegisterPage.handleSubmit();
            });
            
            // Enter key advances to next step
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && document.activeElement?.tagName === 'INPUT') {
                    if (RegisterPage.currentStep < RegisterPage.totalSteps) {
                        e.preventDefault();
                        RegisterPage.nextStep();
                    } else {
                        RegisterPage.handleSubmit();
                    }
                }
            });
        });
        
        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            RegisterPage.init();
        }
    </script>
</body>
</html>
