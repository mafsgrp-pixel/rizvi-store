<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6C4DF6">
    <title>Forgot Password - RASAAI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236C4DF6'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-weight='bold'>R</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;font-family:var(--font)}
        body.dark-mode{background:var(--dark-bg)}
        .card{background:var(--card);border-radius:24px;padding:40px 32px;max-width:440px;width:100%;border:1px solid var(--border);box-shadow:var(--shadow);text-align:center}
        body.dark-mode .card{background:var(--dark-card);border-color:var(--dark-border)}
        .logo{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;display:inline-block}
        h2{font-size:22px;font-weight:700;margin-bottom:8px}
        p{color:var(--text-secondary);margin-bottom:24px;font-size:14px}
        body.dark-mode p{color:var(--dark-muted)}
        input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid var(--border);font-size:16px;margin-bottom:16px;background:var(--input-bg);color:var(--text)}
        body.dark-mode input{background:var(--dark-input-bg);border-color:var(--dark-border);color:var(--dark-text)}
        .btn{width:100%;padding:14px;border-radius:14px;background:var(--primary);color:#FFF;font-weight:600;font-size:16px;cursor:pointer;border:none}
        .btn:hover{background:var(--primary-hover)}
        .back-link{display:block;margin-top:20px;color:var(--primary);font-size:14px;text-decoration:none}
        #msg{margin-top:12px;font-size:14px;font-weight:500}
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">RASAAI</div>
        <h2>🔑 Forgot Password?</h2>
        <p>Enter your registered email and we'll send you a reset OTP.</p>
        <form onsubmit="return false">
            <input type="email" id="forgot-email" placeholder="your@email.com" required autocomplete="email" autofocus>
            <button class="btn" onclick="handleForgot()">Send Reset OTP</button>
        </form>
        <p id="msg"></p>
        <a href="login.html" class="back-link">← Back to Login</a>
    </div>

    <script>
        function handleForgot() {
            const email = document.getElementById('forgot-email').value.trim();
            const msg = document.getElementById('msg');
            if (!email || !email.includes('@')) {
                msg.textContent = '❌ Please enter a valid email address';
                msg.style.color = 'var(--danger)';
                return;
            }
            // Demo OTP
            msg.textContent = '✅ OTP sent to ' + email + ' (Demo OTP: 123456)';
            msg.style.color = 'var(--success)';
            
            // Store OTP for verification
            if (typeof Storage !== 'undefined') {
                Storage.set('resetOTP', { email, otp: '123456', expires: Date.now() + 600000 });
            }
        }
    </script>
</body>
</html>
