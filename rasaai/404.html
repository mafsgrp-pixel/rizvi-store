<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | RASAAI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',system-ui,sans-serif;
            background:#F7F8FC;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            text-align:center;
            padding:20px;
        }
        body.dark-mode{background:#0F1117;color:#fff}
        .code{font-size:120px;font-weight:900;background:linear-gradient(135deg,#6C4DF6,#00D4FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
        h1{font-size:28px;margin:20px 0}
        p{color:#6B7280;margin-bottom:30px}
        .btn{
            display:inline-block;
            padding:14px 32px;
            background:#6C4DF6;
            color:#fff;
            border-radius:14px;
            text-decoration:none;
            font-weight:600;
            transition:all 0.3s;
        }
        .btn:hover{background:#8A63FF;transform:scale(1.05)}
    </style>
</head>
<body>
    <div>
        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>The rickshaw you're looking for has moved to another zone.</p>
        <a href="/rasaai/" class="btn">← Back to Home</a>
    </div>
</body>
</html>
